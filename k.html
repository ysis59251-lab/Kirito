<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader</title>

<style>
:root{
  --bg:#0f1115;
  --bg-soft:#161a24;
  --text:#eaeaf0;
  --accent:#ff6a3d;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:56px;
  background:rgba(15,17,21,.85);
  backdrop-filter: blur(10px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  z-index:100;
}

.topbar h1{
  font-size:14px;
  margin:0;
}

.topbar button{
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

/* ===== READER ===== */
.reader{
  max-width:900px;
  margin:70px auto 120px;
  padding:0 10px;
}

.page{
  margin:0;           /* เอาช่องว่างออก */
}

.page img{
  width:100%;
  display:block;
  border-radius:0;    /* ไม่โค้ง */
}

/* ===== BOTTOM BAR ===== */
.controls{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(15,17,21,.9);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  height:60px;
  z-index:100;
}

.controls button{
  background:none;
  border:none;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

/* ===== DARK/LIGHT ===== */
.light{
  --bg:#f5f6fa;
  --bg-soft:#fff;
  --text:#111;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="history.back()">←</button>
  <h1>Solo Max-Level Newbie ตอนที่ 237</h1>
  <button onclick="toggleTheme()">🌙</button>
</div>

<!-- READER -->
<div class="reader" id="reader"></div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="prevChapter()">⏮ ก่อนหน้า</button>
  <button onclick="scrollToTop()">⬆️ บน</button>
  <button onclick="nextChapter()">ถัดไป ⏭</button>
</div>

<script>
/* ===== CONFIG ===== */
const images = [
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-1.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-2.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-3.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-4.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-5.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-6.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-7.jpg",
  "https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-8.jpg",
"https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-9.jpg",
"https://www.up-manga.com/wp-content/uploads/2024/03/The-Extras-Academy-Survival-Guide-ep0-10.jpg",

];

const prevPage = "236.html";
const nextPage = "238.html";

/* ===== LOAD IMAGES ===== */
const reader = document.getElementById("reader");

images.forEach(src=>{
  const div = document.createElement("div");
  div.className="page";
  div.innerHTML=`<img src="${src}" loading="lazy">`;
  reader.appendChild(div);
});

/* ===== FUNCTIONS ===== */
function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

function prevChapter(){
  location.href = prevPage;
}

function nextChapter(){
  location.href = nextPage;
}

function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
