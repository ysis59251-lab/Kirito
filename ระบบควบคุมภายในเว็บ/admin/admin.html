<!-- ================= HTML ================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* ====== (CSS ของนายเหมือนเดิม ผมไม่ตัด) ====== */
:root{
  --bg1:#0a0a0f;
  --bg2:#12122a;
  --card:rgba(255,255,255,0.05);
  --stroke:rgba(255,255,255,0.08);
  --accent:#ff006e;
  --accent2:#00c6ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:linear-gradient(160deg,#0a0a0f,#12122a);
  color:#fff;
}

header{
  padding:16px;
  background:rgba(20,20,40,0.6);
  position:sticky;
  top:0;
}

.container{padding:16px;display:flex;flex-direction:column;gap:14px;}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  padding:14px;
  border-radius:16px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#000;
  color:#fff;
  border:1px solid var(--stroke);
}

#animeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
}

.anime-card img{width:100%;height:170px;object-fit:cover;}

.btn-box{
  position:fixed;
  right:20px;
  bottom:20px;
}
</style>
</head>

<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="container">

<!-- 👥 ONLINE -->
<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
  <div id="onlineList"></div>
</div>

<div class="card">
  <div id="topPage"></div>
</div>

<!-- 🔎 SEARCH -->
<div class="card">
  <h3>ค้นหา</h3>
  <input id="searchInput" oninput="searchAnime()">
</div>

<!-- 🎬 LIST -->
<div class="card">
  <h3>อนิเมะ</h3>
  <div id="animeList"></div>
</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  onDisconnect,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ===== CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAlhHlFFuDRtFmWEFzCfZc-m4vI3V2Nqeg",
  authDomain: "mpmp-5864a.firebaseapp.com",
  databaseURL: "https://mpmp-5864a-default-rtdb.firebaseio.com",
  projectId: "mpmp-5864a",
  appId: "1:1071327366091:web:239403c1df5da38662c44e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== SESSION ID ===== */
const sid = sessionStorage.getItem("sid") || crypto.randomUUID();
sessionStorage.setItem("sid", sid);

const userRef = ref(db, "onlineUsers/" + sid);

/* ===== UPDATE USER (Heartbeat) ===== */
function updateUser(){
  set(userRef, {
    page: location.pathname,
    title: document.title,
    time: Date.now()
  });
}

/* เข้าเว็บ */
updateUser();

/* อัปเดตทุก 10 วิ กันค้าง */
setInterval(updateUser, 10000);

/* ออกเว็บ */
onDisconnect(userRef).remove();

/* ===== DISPLAY ===== */
onValue(ref(db, "onlineUsers"), (snap) => {
  const data = snap.val() || {};
  const now = Date.now();

  let count = 0;
  const box = document.getElementById("onlineList");
  box.innerHTML = "";

  const pageStats = {};

  for (let id in data) {
    const u = data[id];

    // ตัดคนตาย
    if (!u.time || now - u.time > 15000) {
  remove(ref(db, "onlineUsers/" + id));
  continue;
}

    count++;

    // รวมสถิติทุกหน้า
    pageStats[u.title] = (pageStats[u.title] || 0) + 1;

    box.innerHTML += `
      <div style="padding:6px;border-bottom:1px solid #333">
        👤 ${id}<br>
        📺 ${u.title}<br>
        📄 ${u.page}
      </div>
    `;
  }

  document.getElementById("onlineCount").textContent = count;

  // 🔥 TOP อนิเมะ
  const topBox = document.getElementById("topPage");
  let html = "<h4>🔥 อนิเมะคนดูสด</h4>";

  Object.entries(pageStats)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .forEach(([name,val])=>{
      html += `📺 ${name} (${val})<br>`;
    });

  topBox.innerHTML = html;
});

</script>

</body>
</html>
