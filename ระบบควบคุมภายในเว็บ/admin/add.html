<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบดึงข้อมูล</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

input{
  width:80%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ff99;
  cursor:pointer;
  margin:5px;
}

#result{
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  background:#222;
  max-height:400px;
  overflow:auto;
  text-align:left;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>🔍 ดึงข้อมูลจากหน้าเว็บ</h2>

<input id="url" placeholder="วางลิงก์หน้าเว็บของคุณ">
<br>

<button onclick="load()">ดึงข้อมูล</button>
<button onclick="copyText()">📋 ก็อปทั้งหมด</button>
<button onclick="clearBox()">🗑️ ล้าง</button>

<div id="result">ผลลัพธ์จะอยู่ตรงนี้...</div>

<script>
let savedText = "";

async function load(){
  const url = document.getElementById("url").value;

  if(!url){
    alert("ใส่ลิงก์ก่อน!");
    return;
  }

  try{
    const res = await fetch(url);
    const text = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(text, "text/html");

    // 🔥 ดึงทั้งข้อความ
    const content = doc.body.innerText;

    savedText = content;

    document.getElementById("result").innerText = content;

  }catch(err){
    document.getElementById("result").innerText = "❌ ดึงไม่ได้ (อาจติด CORS หรือ URL ผิด)";
  }
}

function copyText(){
  if(!savedText){
    alert("ยังไม่มีข้อมูล!");
    return;
  }

  navigator.clipboard.writeText(savedText)
  .then(()=> alert("✅ คัดลอกแล้ว"))
  .catch(()=> alert("❌ คัดลอกไม่สำเร็จ"));
}

function clearBox(){
  savedText = "";
  document.getElementById("result").innerText = "";
}
</script>

</body>
</html>
