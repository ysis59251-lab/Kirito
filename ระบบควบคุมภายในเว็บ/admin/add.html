<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มอนิเมะ</title>

<style>

.btn-row{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.btn-left,.btn-right{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

/* วาง */
.btn-left{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#000;
}

/* ล้าง */
.btn-right{
  background:linear-gradient(135deg,#ff416c,#ff4b2b);
  color:#fff;
}

.btn-left:hover,
.btn-right:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f0f);
  color:#fff;
}

/* CARD */
.box{
  width:92%;
  max-width:420px;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h2{
  text-align:center;
  margin-bottom:15px;
  font-size:20px;
  letter-spacing:1px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:13px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#151515;
  color:#fff;
  outline:none;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.05);
}

input:focus,select:focus{
  border-color:#ff4d6d;
  box-shadow:0 0 0 2px rgba(255,77,109,0.2);
}

/* CHECKBOX AREA */
.lang-box{
  display:flex;
  gap:15px;
  margin:10px 0;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff4d6d,#ff006e);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 10px 25px rgba(255,0,110,0.25);
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(255,0,110,0.35);
}

button:active{
  transform:scale(0.98);
}

/* POPUP */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111;
  padding:25px 35px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  font-size:15px;
}

/* SMALL UX TOUCH */
::placeholder{
  color:#888;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 เพิ่มอนิเมะ</h2>

  <input id="anime" placeholder="ชื่อ id (Naruto)">
  <input id="name" placeholder="ชื่อเรื่อง">

  <select id="episode">
    <option value="">เลือกตอน</option>
    <script>
      for(let i=1;i<=30;i++){
        document.write(`<option value="${i}">ตอนที่ ${i}</option>`);
      }
    </script>
  </select>

  <div class="lang-box">
    <label><input type="checkbox" value="พากย์ไทย"> พากย์ไทย</label>
    <label><input type="checkbox" value="ซับไทย"> ซับไทย</label>
  </div>

<input id="video_url" placeholder="ลิงก์วิดีโอ">
<div class="btn-row">
  <button class="btn-left" onclick="pasteText()"> วาง</button>
  <button class="btn-right" onclick="clearInput()"> ล้าง</button>
</div>

<script>
function clearInput(){
  document.getElementById("video_url").value = "";
}
</script>
  <input id="status" placeholder="สถานะวิดิโอ">
  <input id="desc" placeholder="เรื่องย่อ">
  <input id="cover" placeholder="ลิงก์รูป">

  <button onclick="send()">🚀 เพิ่มตอน</button>
</div>

<div id="popup">
  <div class="popup-box">
    <div id="popupText">⏳</div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLBavKOeoTwDw0pTg0NRojLA4rUyNII99HR6-OvHnEq_493fyiOiatj1GYjGqlZkws/exec";


/* =========================
   INPUT ELEMENTS
========================= */
const btn = document.querySelector("button");

const animeInput   = document.getElementById("anime");
const nameInput    = document.getElementById("name");
const episodeInput = document.getElementById("episode");
const videoInput   = document.getElementById("video_url");
const statusInput  = document.getElementById("status");
const descInput    = document.getElementById("desc");
const coverInput   = document.getElementById("cover");

const popup = document.getElementById("popup");
const text  = document.getElementById("popupText");

const langs = document.querySelectorAll('.lang-box input:checked');


/* =========================
   INPUT TOOLS
========================= */
function clearInput(){
  document.getElementById("video_url").value = "";
}

async function pasteText(){
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("video_url").value = text;
  } catch (err) {
    alert("เบราว์เซอร์ไม่อนุญาตให้ดึงคลิปบอร์ด");
  }
}


/* =========================
   MAIN SEND FUNCTION
========================= */
async function send(){

  // ล็อคปุ่ม
  btn.disabled = true;

  popup.style.display = "flex";
  text.innerText = "⏳ กำลังส่ง...";

  try{

    for(let lang of langs){

      const url = API + 
      "?anime=" + encodeURIComponent(animeInput.value) +
      "&name=" + encodeURIComponent(nameInput.value) +
      "&episode=" + episodeInput.value +
      "&title=" + encodeURIComponent(lang.value) +
      "&video_url=" + encodeURIComponent(videoInput.value) +
      "&status=" + encodeURIComponent(statusInput.value) +
      "&desc=" + encodeURIComponent(descInput.value) +
      "&cover=" + encodeURIComponent(coverInput.value);

      await new Promise(resolve=>{
        const img = new Image();
        img.src = url;
        img.onload = resolve;
        img.onerror = resolve;
      });

    }

    text.innerText = "✅ ส่งแล้ว!";

  }catch(e){
    text.innerText = "❌ ส่งไม่สำเร็จ";
  }

  setTimeout(()=>{
    popup.style.display = "none";
    btn.disabled = false;
  },1500);
}


/* =========================
   POPUP SYSTEM
========================= */
function show(msg){
  const popup = document.getElementById("popup");
  const text = document.getElementById("popupText");

  popup.style.display = "flex";
  text.innerText = msg;

  setTimeout(()=>{
    popup.style.display = "none";
  },1500);
}
</script>

</body>
</html>
