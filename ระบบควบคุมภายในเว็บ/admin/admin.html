<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:system-ui;
}
header{
  padding:15px;
  background:#111;
  font-size:20px;
  font-weight:bold;
}
.container{
  padding:20px;
}
.card{
  background:#1b1b1b;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
button{
  padding:6px 10px;
  border:none;
  cursor:pointer;
  border-radius:5px;
  margin-left:5px;
  color:#fff;
}
input{
  padding:8px;
  width:100%;
  max-width:400px;
  border-radius:6px;
  border:none;
}
.anime-item{
  display:flex;
  justify-content:space-between;
  background:#222;
  padding:8px;
  margin-bottom:5px;
  border-radius:6px;
}

/* ===== Top Right Inbox Button ===== */
.topbar{
  position:fixed;
  top:15px;
  right:20px;
  z-index:999;
}
.inbox-btn{
  background:#222;
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
}
.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

/* ===== Slide Panel ===== */
.inbox-panel{
  position:fixed;
  top:0;
  right:-350px;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  overflow-y:auto;
  transition:0.3s;
  z-index:998;
}
.inbox-panel.active{
  right:0;
}
.message-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#222;
  padding:8px;
  margin-bottom:6px;
  border-radius:6px;
}
.message-actions{
  display:flex;
  gap:5px;
}
.btn-view{ background:#2196f3; }
.btn-delete{ background:#ff3c3c; }
.btn-ban{ background:#9c27b0; }
</style>
</head>
<body>

<header>🔥 Anime Admin Dashboard</header>

<a href="add.html">
  <button>เพื่อมตอน</button>
</a>

<!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->
<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<!-- Slide Panel แจ้งปัญหา -->
<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <h3>🔎 ค้นหาอนิเมะ</h3>
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการอนิเมะ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🏆 อันดับยอดฮิต</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getDatabase, ref, set, onValue, remove, update, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",
  projectId: "darkframe300",
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= ONLINE USERS ================= */

const userId = "admin_" + Math.random().toString(36).substr(2,9);
const onlineRef = ref(db, "onlineUsers/" + userId);

set(onlineRef, true);
onDisconnect(onlineRef).remove();

onValue(ref(db, "onlineUsers"), (snap)=>{
  document.getElementById("onlineCount").innerText =
    snap.exists() ? Object.keys(snap.val()).length : 0;
});

/* ================= LOAD & SEARCH ANIME ================= */

let allAnime = [];

onValue(ref(db, "anime"), (snap)=>{
  allAnime = [];

  if(!snap.exists()){
    document.getElementById("animeList").innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snap.forEach(child=>{
    allAnime.push({
      id: child.key,
      ...child.val()
    });
  });

  renderAnime(allAnime);
  renderRanking(allAnime);
});

function renderAnime(list){
  const container = document.getElementById("animeList");
  container.innerHTML = "";

  list.forEach(data=>{
    container.innerHTML += `
      <div class="anime-item">
        ${data.title} (${data.status || "active"})
        <div>
          <button style="background:#ff9800"
            onclick="disableAnime('${data.id}')">ปิด</button>
          <button style="background:#ff3c3c"
            onclick="deleteAnime('${data.id}')">ลบ</button>
        </div>
      </div>
    `;
  });
}

window.searchAnime = function(){
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allAnime.filter(a =>
    a.title?.toLowerCase().includes(keyword)
  );
  renderAnime(filtered);
};

window.disableAnime = function(id){
  update(ref(db, "anime/"+id), {status:"disabled"});
};

window.deleteAnime = function(id){
  if(confirm("ลบเรื่องนี้?")){
    remove(ref(db, "anime/"+id));
  }
};

/* ================= RANKING ================= */

function renderRanking(arr){
  const sorted = [...arr].sort((a,b)=>
    (b.views||0)-(a.views||0)
  );

  const container = document.getElementById("ranking");
  container.innerHTML="";

  sorted.slice(0,5).forEach((anime,i)=>{
    container.innerHTML += `
      <div class="anime-item">
        #${i+1} ${anime.title} (${anime.views||0} views)
      </div>
    `;
  });
}

/* ================= REPORT SYSTEM ================= */

window.toggleReportPanel = function(){
  document.getElementById("reportPanel").classList.toggle("active");
};

let lastReportCount = 0;

onValue(ref(db,"reports"),(snapshot)=>{

  const container = document.getElementById("reportList");
  const badge = document.getElementById("reportUnread");

  container.innerHTML = "";

  if(!snapshot.exists()){
    container.innerHTML = "ไม่มีรายงาน";
    badge.innerText = 0;
    return;
  }

  let unread = 0;
  let count = 0;

  const reports = [];

  snapshot.forEach(child=>{
    reports.push({
      id: child.key,
      ...child.val()
    });
  });

  // เรียงใหม่ล่าสุดก่อน
  reports.reverse();

  reports.forEach(data=>{

    count++;
    if(!data.read) unread++;

    const div = document.createElement("div");
    div.className = "message-item";

    div.innerHTML = `
      <div>
        <b>${data.page || "ไม่ทราบหน้า"}</b>
        ${data.read ? "✅" : "🆕"}<br>
        <small>${new Date(data.time).toLocaleString()}</small>
      </div>
      <div class="message-actions">
        <button class="btn-view">เปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-view").onclick = () => {
      alert(
        "หน้า: "+data.page+
        "\n\nรายละเอียด:\n"+data.detail+
        "\n\nเวลา: "+new Date(data.time).toLocaleString()
      );

      update(ref(db,"reports/"+data.id),{read:true});
    };

    div.querySelector(".btn-delete").onclick = () => {
      if(confirm("ลบรายงานนี้?")){
        remove(ref(db,"reports/"+data.id));
      }
    };

    container.appendChild(div);
  });

  badge.innerText = unread;

  if(count > lastReportCount){
    document.getElementById("notifySound").play().catch(()=>{});
  }

  lastReportCount = count;
});

</script>

</body>
</html>
