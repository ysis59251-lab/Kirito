<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeFume - Dead Mount Death Play</title>

<style>

#nowEp {
  text-align: center;
  margin-top: 12px;
  font-size: 16px;
  font-weight: bold;
  color: #ff3b3b;
}

/* =========================
   GLOBAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
}

body {
  color: #fff;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
              url("https://img.freepik.com/free-photo/anime-night-sky-illustration_23-2151684372.jpg") center/cover fixed;
  min-height: 100vh;
  line-height: 1.5;
}

/* =========================
   HEADER
========================= */
.header {
  padding: 16px;
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 0.5px;
  background: linear-gradient(90deg, #e50914, #b20710);
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
}

/* =========================
   PLAYER
========================= */
.player {
  max-width: 900px;
  margin: 24px auto;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.85);
}

.video-box {
  position: relative;
  width: 100%;
  height: 100%;
}

.video-box iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Thumbnail */
.thumb {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  cursor: pointer;
  transition: 0.3s;
}

.thumb:hover {
  filter: brightness(0.7);
}

/* Play Button */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 50px;
  background: rgba(0,0,0,0.6);
  padding: 15px 20px;
  border-radius: 50%;
  z-index: 3;
  cursor: pointer;
}

/* =========================
   CONTROL BUTTON
========================= */
.control {
  display: flex;
  flex-direction: row;   /* บังคับแนวนอน */
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.btn {
  padding: 8px 16px;   /* ทำให้เล็กลง */
  font-size: 14px;
  border-radius: 30px;
  background: linear-gradient(135deg, #e50914, #b20710);
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

/* ปุ่มหลัก (เลือกตอน) */
.btn.main {
  padding: 10px 20px;
  font-weight: bold;
}

/* hover */
.btn:hover {
  transform: translateY(-2px);
  background: linear-gradient(135deg,#ff1b26,#c8000a);
}

/* =========================
   MODAL
========================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 10;
  padding: 20px;
}

.modal-content {
  background: linear-gradient(180deg,#111,#0b0b0b);
  max-width: 520px;
  margin: 60px auto;
  padding: 16px;
  border-radius: 18px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: none; opacity: 1; }
}

/* =========================
   EPISODE LIST
========================= */
.ep {
  padding: 14px;
  margin-bottom: 8px;
  border-radius: 12px;
  cursor: pointer;
  background: rgba(255,255,255,0.03);
  transition: 0.2s;
  font-size: 16px;
}

.ep:hover {
  background: rgba(255,255,255,0.08);
}

.ep.active {
  background: linear-gradient(135deg,#e50914,#b20710);
  font-weight: 700;
  box-shadow: 0 0 10px rgba(229,9,20,0.7);
}

.ep.watched {
  background: rgba(255,255,255,0.08);
  color: #bbb;
}

.ep.watched::after {
  content: " ✔";
  color: #00ffcc;
}

/* =========================
   ANIME CARD
========================= */
.container {
  max-width: 540px;
  margin: 24px auto;
  padding: 0 16px;
}

.anime-img {
  width: 100%;
  max-width: 280px;
  display: block;
  margin: 24px auto;
  border-radius: 16px;
  filter: drop-shadow(0 12px 30px rgba(0,0,0,0.8));
}

.card-wrap {
  margin-top: 16px;
}

.card {
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
}

.card img {
  width: 100%;
  max-width: 300px;
  display: block;
  margin: 0 auto;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* =========================
   MOBILE
========================= */
@media(max-width:600px) {
  .header { font-size: 20px; }
  button { width: 100%; padding: 14px 0; }
  .desc { font-size: 15px; }
}
</style>
</head>

<body>

<div class="header">🎬 AnimeFume</div>

<div class="container">
<h2 id="animeName"></h2>

<div class="card-wrap">
  <div class="card">
    <img id="coverImg">
  </div>

  <p class="desc" id="desc"></p></div>

<div class="player">
  <div class="video-box">
    <iframe id="video" allowfullscreen></iframe>
  </div>
</div>

<div id="nowEp">🎬 กำลังโหลด...</div>

<!-- CONTROL -->
<div class="control">
  <button onclick="prevEp()">⏮ ก่อนหน้า</button>
  <button onclick="openModal()">📺 เลือกตอน</button>
  <button onclick="nextEp()">⏭ ถัดไป</button>
</div>

<!-- Anime Card -->
<img class="anime-img" src="https://www.pngarts.com/files/12/Manga-Anime-Girl-Transparent-Image.png" alt="Anime Girl">

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="episodeList"></div>
</div>

<script>
const SHEET_ID="1dafLtcL0ba4ZmWpFLMhpMXcYF81uwJ42lgOjF5CRmPw";
const API=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const currentAnime = "Dark Pulse"; // 👈 ต้องตรงกับคอลัมน์ anime ในชีต

let episodes=[];
let currentIndex=0;
let watched=JSON.parse(localStorage.getItem("watchedEpisodes")||"[]");

fetch(API)
.then(res=>res.text())
.then(text=>{
  const json=JSON.parse(text.substring(47).slice(0,-2));

  // 🔥 ดึง + กรองเรื่อง
  episodes=json.table.rows
    .map(r=>({
      anime:r.c[0]?.v,
      name:r.c[1]?.v,
      ep:r.c[2]?.v,
      title:r.c[3]?.v,
      url:r.c[4]?.v,
      desc:r.c[6]?.v,
      cover:r.c[7]?.v
    }))
    .filter(e=>e.anime === currentAnime);

  // ❗ กัน error ถ้าไม่มีข้อมูล
  if(episodes.length === 0){
    document.getElementById("animeName").innerText = "ไม่พบข้อมูล";
    return;
  }

  // 🔥 หา info จริง (ไม่ใช้ index 0 มั่วๆ)
  const info = episodes.find(e => e.cover || e.desc) || episodes[0];

  // 🏷️ ชื่อเรื่อง
  document.getElementById("animeName").innerText = info.name || "";

  // 📖 เรื่องย่อ
  document.getElementById("desc").innerHTML =
    `<b>📖 เรื่องย่อ</b><br><br>` +
    (info.desc || "").replace(/\n/g,"<br><br>");

  // 🖼️ รูปปก (คงที่)
  document.getElementById("coverImg").src = info.cover || "";

  renderEpisodes();

  const last=localStorage.getItem("lastEpisode");
  if(last){
    const i=episodes.findIndex(e=>e.url===last);
    currentIndex=i!==-1?i:0;
  }

  play(episodes[currentIndex].url);
});

function renderEpisodes(){
  const box=document.getElementById("episodeList");
  box.innerHTML="";

  episodes.forEach((e,i)=>{
    const div=document.createElement("div");
    div.className="ep";
    div.innerText=`ตอนที่ ${e.ep}`;
    if(watched.includes(e.url)) div.classList.add("watched");

    div.onclick=()=>play(e.url);
    box.appendChild(div);
  });

  highlight();
}

function play(url){
  const video=document.getElementById("video");

  if(url.includes("drive.google.com")){
    const id=url.match(/\/d\/(.+?)\//)[1];
    url=`https://drive.google.com/file/d/${id}/preview`;
  }

  video.src=url;

  currentIndex=episodes.findIndex(e=>e.url===url || url.includes(e.url));

  localStorage.setItem("lastEpisode",episodes[currentIndex].url);

  if(!watched.includes(episodes[currentIndex].url)){
    watched.push(episodes[currentIndex].url);
    localStorage.setItem("watchedEpisodes",JSON.stringify(watched));
  }

  highlight();
  renderEpisodes();
  closeModal();

  document.getElementById("nowEp").innerText =
    "🎬 กำลังดู: ตอนที่ "+episodes[currentIndex].ep+" • "+episodes[currentIndex].title;
}

function nextEp(){
  if(currentIndex<episodes.length-1){
    currentIndex++;
    play(episodes[currentIndex].url);
  }
}

function prevEp(){
  if(currentIndex>0){
    currentIndex--;
    play(episodes[currentIndex].url);
  }
}

function highlight(){
  document.querySelectorAll(".ep").forEach((el,i)=>{
    el.classList.toggle("active",i===currentIndex);
  });
}

function openModal(){
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("modal").onclick=closeModal;
</script>


</body>
</html>
