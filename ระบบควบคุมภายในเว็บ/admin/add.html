<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มอนิเมะ</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:#fff;
  font-family:system-ui;
}

.box{
  width:95%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h2{margin-bottom:15px;}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  color:#fff;
  cursor:pointer;
}

.status{
  margin-top:10px;
  font-size:14px;
}

.lang-box{
  text-align:left;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 เพิ่มอนิเมะ</h2>

  <input id="anime" placeholder="ชื่อ id (Naruto)">
  <input id="name" placeholder="ชื่อเรื่อง">

  <!-- เลือกตอน -->
  <select id="episode">
    <option value="">เลือกตอน</option>
    <script>
      for(let i=1;i<=30;i++){
        document.write(`<option value="${i}">ตอนที่ ${i}</option>`);
      }
    </script>
  </select>

  <!-- เลือกภาษา -->
  <div class="lang-box">
    <label><input type="checkbox" value="พากย์ไทย"> พากย์ไทย</label>
    <label><input type="checkbox" value="ซับไทย"> ซับไทย</label>
  </div>

  <input id="video_url" placeholder="ลิงก์วิดีโอ">
  <input id="status" placeholder="สถานะ">
  <input id="desc" placeholder="คำอธิบาย">
  <input id="cover" placeholder="ลิงก์รูป">

  <button onclick="send()">🚀 เพิ่มตอน</button>

  <div class="status" id="statusText"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLBavKOeoTwDw0pTg0NRojLA4rUyNII99HR6-OvHnEq_493fyiOiatj1GYjGqlZkws/exec";

async function send(){

  const statusText = document.getElementById("statusText");
  const langs = document.querySelectorAll('.lang-box input:checked');

  if(!episode.value){
    statusText.innerText = "⚠️ เลือกตอน";
    return;
  }

  if(langs.length === 0){
    statusText.innerText = "⚠️ เลือกภาษา";
    return;
  }

  statusText.innerText = "⏳ กำลังส่ง...";

  for(let lang of langs){

    const url = API + 
    "?anime=" + encodeURIComponent(anime.value) +
    "&name=" + encodeURIComponent(name.value) +
    "&episode=" + episode.value +
    "&title=" + encodeURIComponent(lang.value) +
    "&video_url=" + encodeURIComponent(video_url.value) +
    "&status=" + encodeURIComponent(status.value) +
    "&desc=" + encodeURIComponent(desc.value) +
    "&cover=" + encodeURIComponent(cover.value);

    await fetch(url);
  }

  statusText.innerText = "✅ เพิ่มสำเร็จ!";
}
</script>

</body>
</html>
