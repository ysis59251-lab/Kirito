<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0c14;
  color:#fff;
  height:100vh;
  overflow:hidden;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:260px;
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu-item{
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  transition:0.2s;
}

.menu-item:hover{
  background:#00d4ff22;
}

.menu-item.active{
  background:linear-gradient(90deg,#ff2e88,#00d4ff);
  color:#000;
  font-weight:bold;
}

.content{
  flex:1;
  padding:16px;
  overflow:auto;
}

.panel{
  display:none;
  background:rgba(255,255,255,0.05);
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
}

.panel.active{
  display:block;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="sidebar">
  <div class="menu-item active" onclick="showPage('online')">👥 คนออนไลน์</div>
  <div class="menu-item" onclick="showPage('top')">🔥 Top Anime</div>
  <div class="menu-item" onclick="showPage('page')">📄 Page Stats</div>
</div>

<!-- RIGHT -->
<div class="content">

  <div id="page-online" class="panel active">
    <h3>👥 Online Users</h3>
    <div id="onlineList"></div>
    <h4>รวม: <span id="onlineCount">0</span></h4>
  </div>

  <div id="page-top" class="panel">
    <h3>🔥 Top Anime</h3>
    <div id="topPage"></div>
  </div>

  <div id="page-page" class="panel">
    <h3>📄 Page Stats</h3>
    <div id="pageList"></div>
  </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  onDisconnect,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCUxv...",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  storageBucket: "reader-4a13f.firebasestorage.app",
  messagingSenderId: "220776049054",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */
const sid = sessionStorage.getItem("sid") || crypto.randomUUID();
sessionStorage.setItem("sid", sid);

const userRef = ref(db,"onlineUsers/"+sid);

/* ================= HEARTBEAT ================= */
function updateUser(){
  set(userRef,{
    page: location.pathname,
    title: document.title,
    time: Date.now(),
    role: "user"
  });
}

updateUser();
setInterval(updateUser, 8000);
onDisconnect(userRef).remove();

/* ================= PAGE SWITCH ================= */
window.showPage = function(page){

  document.querySelectorAll(".panel").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById("page-"+page).classList.add("active");

  document.querySelectorAll(".menu-item").forEach(m=>{
    m.classList.remove("active");
  });

  event.target.classList.add("active");
};

/* ================= REALTIME ================= */
onValue(ref(db,"onlineUsers"), snap=>{

  const data = snap.val() || {};
  const now = Date.now();

  let count = 0;
  const pageStats = {};
  const pageCount = {};

  const onlineList = document.getElementById("onlineList");
  const onlineCount = document.getElementById("onlineCount");
  const topPage = document.getElementById("topPage");
  const pageList = document.getElementById("pageList");

  if(onlineList) onlineList.innerHTML = "";

  for(let id in data){
    const u = data[id];

    if(!u.time || now - u.time > 15000){
      remove(ref(db,"onlineUsers/"+id));
      continue;
    }

    count++;

    pageStats[u.title] = (pageStats[u.title]||0)+1;
    pageCount[u.page] = (pageCount[u.page]||0)+1;

    if(onlineList){
      onlineList.innerHTML += `
        👤 ${id}<br>
        📺 ${u.title}<br>
        📄 ${u.page}<hr>
      `;
    }
  }

  if(onlineCount) onlineCount.textContent = count;

  if(topPage){
    topPage.innerHTML = Object.entries(pageStats)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([n,v])=>`📺 ${n} (${v})`)
      .join("<br>");
  }

  if(pageList){
    pageList.innerHTML = Object.entries(pageCount)
      .sort((a,b)=>b[1]-a[1])
      .map(([p,c])=>`📄 ${p} : ${c}`)
      .join("<br>");
  }

});
</script>

</body>
</html>
