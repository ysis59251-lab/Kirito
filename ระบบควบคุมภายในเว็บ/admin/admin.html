<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* =========================
   RESET / BASE
========================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:system-ui;
  background:linear-gradient(135deg,#0a0a0a,#121226);
  color:#fff;
}

/* =========================
   HEADER
========================= */
header{
  padding:18px;
  font-size:22px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* =========================
   LAYOUT
========================= */
.container{
  padding:20px;
}

/* =========================
   CARD UI
========================= */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* =========================
   INPUT
========================= */
input{
  padding:10px;
  width:100%;
  max-width:400px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  background:#262626;
  box-shadow:0 0 10px #ff006e;
}

/* =========================
   BUTTON (GLOBAL)
========================= */
button{
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  color:#fff;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #ff4d6d;
}

/* =========================
   ANIME LIST (ADMIN)
========================= */
.anime-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:6px;
  border-radius:10px;
  transition:0.2s;
}

.anime-item:hover{
  background:#242424;
  transform:scale(1.02);
}

/* =========================
   ANIME CARD (READER)
========================= */
.anime-card{
  display:inline-block;
  margin:10px;
  border-radius:12px;
  overflow:hidden;
}

.card-img img{
  width:100%;
  max-width:180px;
  height:110px;
  object-fit:cover;
  border-radius:12px;
}

/* =========================
   TOP BAR (REPORT BUTTON)
========================= */
.topbar{
  position:fixed;
  top:15px;
  right:20px;
  z-index:999;
}

.inbox-btn{
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  box-shadow:0 0 10px #ff006e;
}

.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3c3c;
  color:#fff;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

/* =========================
   SLIDE PANEL
========================= */
.inbox-panel{
  position:fixed;
  top:0;
  right:-380px;
  width:350px;
  height:100%;
  background:#0d0d0d;
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
  z-index:998;
  box-shadow:-10px 0 30px rgba(0,0,0,0.8);
}

.inbox-panel.active{
  right:0;
}

/* =========================
   MESSAGE ITEM
========================= */
.message-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}

.message-item:hover{
  background:#242424;
}

/* =========================
   BUTTON COLORS
========================= */
.btn-view{ background:#2196f3; }
.btn-delete{ background:#ff3c3c; }
.btn-ban{ background:#9c27b0; }

/* =========================
   FLOAT BUTTON BOX
========================= */
.btn-box{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.btn-box button{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  padding:12px 18px;
  border-radius:30px;
  box-shadow:0 0 15px #0072ff;
}
</style>
</head>
<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="btn-box">
  <a href="add.html"><button>ลงวิดิโอ</button></a>
  <a href="wo.html"><button>ลงรูป</button></a>
</div>

<!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->
<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<!-- Slide Panel แจ้งปัญหา -->
<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <h3>🔎 ค้นหาอนิเมะ</h3>
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการอนิเมะ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🏆 อันดับยอดฮิต</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">
/* =========================
FIREBASE IMPORT (ครั้งเดียวพอ)
========================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue,
  remove,
  update,
  onDisconnect,
  push,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================
FIREBASE APP #1 (ADMIN)
========================= */
const adminConfig = {
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",
  projectId: "darkframe300",
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"
};

const adminApp = initializeApp(adminConfig, "admin");
const adminDb = getDatabase(adminApp);

/* =========================
FIREBASE APP #2 (READER)
========================= */
const readerConfig = {
  apiKey: "AIzaSyCUxv...",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
};

const readerApp = initializeApp(readerConfig, "reader");
const readerDb = getDatabase(readerApp);

/* =========================================================
===================== ADMIN SYSTEM =========================
========================================================= */

const userId = "admin_" + Math.random().toString(36).slice(2);
const onlineRef = ref(adminDb, "onlineUsers/" + userId);

set(onlineRef, true);
onDisconnect(onlineRef).remove();

/* online count */
onValue(ref(adminDb, "onlineUsers"), (snap) => {
  document.getElementById("onlineCount").innerText =
    snap.exists() ? Object.keys(snap.val()).length : 0;
});

/* anime list */
let allAnime = [];

onValue(ref(adminDb, "anime"), (snap) => {
  const container = document.getElementById("animeList");
  if (!container) return;

  allAnime = [];

  if (!snap.exists()) {
    container.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snap.forEach(child => {
    const d = child.val();
    allAnime.push({
      id: child.key,
      title: d.title || "ไม่มีชื่อ",
      status: d.status || "active",
      views: d.views || 0
    });
  });

  renderAnime(allAnime);
  renderRanking(allAnime);
});

function renderAnime(list) {
  const container = document.getElementById("animeList");
  container.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "anime-item";

    div.innerHTML = `
      ${a.title} (${a.status})
      <div>
        <button style="background:#ff9800">ปิด</button>
        <button style="background:#ff3c3c">ลบ</button>
      </div>
    `;

    div.children[1].children[0].onclick = () =>
      update(ref(adminDb, "anime/" + a.id), { status: "disabled" });

    div.children[1].children[1].onclick = () => {
      if (confirm("ลบเรื่องนี้?")) {
        remove(ref(adminDb, "anime/" + a.id));
      }
    };

    container.appendChild(div);
  });
}

function renderRanking(arr) {
  const sorted = [...arr].sort((a, b) => b.views - a.views);
  const box = document.getElementById("ranking");
  if (!box) return;

  box.innerHTML = "";

  sorted.slice(0, 5).forEach((a, i) => {
    box.innerHTML += `
      <div class="anime-item">
        #${i + 1} ${a.title} (${a.views} views)
      </div>
    `;
  });
}

/* reports */
let lastReportCount = 0;

onValue(ref(adminDb, "reports"), snap => {
  const container = document.getElementById("reportList");
  const badge = document.getElementById("reportUnread");

  if (!container) return;

  container.innerHTML = "";

  if (!snap.exists()) {
    badge.innerText = 0;
    container.innerHTML = "ไม่มีรายงาน";
    return;
  }

  let unread = 0;
  let count = 0;
  const reports = [];

  snap.forEach(c => reports.push({ id: c.key, ...c.val() }));
  reports.reverse();

  reports.forEach(r => {
    count++;
    if (!r.read) unread++;

    const div = document.createElement("div");
    div.className = "message-item";

    div.innerHTML = `
      <div>
        <b>${r.page || "-"}</b>
        ${r.read ? "✅" : "🆕"}<br>
        <small>${r.time ? new Date(r.time).toLocaleString() : "-"}</small>
      </div>
      <div>
        <button class="btn-view">เปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-view").onclick = () => {
      alert(`${r.page}\n\n${r.detail}\n\n${r.time}`);
      update(ref(adminDb, "reports/" + r.id), { read: true });
    };

    div.querySelector(".btn-delete").onclick = () => {
      if (confirm("ลบ?")) remove(ref(adminDb, "reports/" + r.id));
    };

    container.appendChild(div);
  });

  badge.innerText = unread;

  if (count > lastReportCount) {
    document.getElementById("notifySound")?.play();
  }

  lastReportCount = count;
});

/* =========================================================
===================== READER SYSTEM ========================
========================================================= */

let cards = [];
let perPage = 40;
let currentPage = 1;
let savedSearch = "";
let isChangingPage = false;

/* online reader */
function initOnline() {
  const userRef = push(ref(readerDb, "onlineUsers"));
  set(userRef, { time: Date.now(), page: location.pathname });
  onDisconnect(userRef).remove();
}

/* views */
function initViews() {
  document.addEventListener("click", e => {
    const card = e.target.closest(".anime-card");
    if (!card) return;

    const id = card.dataset.id;
    const last = localStorage.getItem("view_" + id);
    const now = Date.now();

    if (last && now - last < 10000) return;

    localStorage.setItem("view_" + id, now);
    runTransaction(ref(readerDb, "animeViews/" + id), v => (v || 0) + 1);
  });
}

/* load sheet */
function loadFromSheet() {
  fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1")
    .then(r => r.json())
    .then(data => {
      const box = document.getElementById("animeList");
      box.innerHTML = "";

      data.forEach((row, i) => {
        const a = document.createElement("a");
        a.className = "anime-card";
        a.href = row.link || "#";
        a.dataset.id = row.id || "a_" + i;
        a.dataset.title = (row.title || "").toLowerCase();
        a.dataset.year = row.year || 0;
        a.dataset.hidden = row.hidden === "TRUE" ? "1" : "0";

        a.innerHTML = `
          <div class="card-img">
            <img src="${row.image || 'https://via.placeholder.com/300'}">
            <div class="overlay">${row.title}</div>
          </div>
        `;

        box.appendChild(a);
      });

      cards = [...document.querySelectorAll(".anime-card")];
      renderPage();
      initHot();
    });
}

/* pagination (สรุปให้สั้น) */
function renderPage() {
  const visible = cards.filter(c => c.dataset.hidden !== "1");
  const start = (currentPage - 1) * perPage;
  const end = start + perPage;

  cards.forEach(c => c.style.display = "none");
  visible.slice(start, end).forEach(c => c.style.display = "");
}

/* START */
document.addEventListener("DOMContentLoaded", () => {
  loadFromSheet();
  initOnline();
  initViews();
});
</script>

</body>
</html>
