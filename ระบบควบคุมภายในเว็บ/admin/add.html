<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เพิ่มอนิเมะ</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

input,button{
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  background:#ff4d6d;
  color:#fff;
}
</style>
</head>

<body>

<h2>เพิ่มอนิเมะ</h2>

<input id="anime" placeholder="anime">
<input id="name" placeholder="name">
<input id="episode" placeholder="episode">
<input id="title" placeholder="title">
<input id="video_url" placeholder="video_url">
<input id="status" placeholder="status">
<input id="desc" placeholder="desc">
<input id="cover" placeholder="cover">

<button onclick="send()">ส่งข้อมูล</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbwFYxU0PfE8j8AHlCtNXAMk8_-FlFF2qTXcWUhU9i6OdItaH5sft1ioGkcsL6CZcppi/exec";

function send(){

  const data = {
    anime: anime.value,
    name: name.value,
    episode: episode.value,
    title: title.value,
    video_url: video_url.value,
    status: status.value,
    desc: desc.value,
    cover: cover.value
  };

  fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(data)
  })
  .then(()=>alert("เพิ่มสำเร็จ!"))
  .catch(()=>alert("พลาด!"));
}
</script>

</body>
</html>
