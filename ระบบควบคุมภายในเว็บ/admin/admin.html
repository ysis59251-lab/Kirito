<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
:root{
  --bg1:#0a0a0f;
  --bg2:#12122a;
  --card:rgba(255,255,255,0.05);
  --stroke:rgba(255,255,255,0.08);
  --accent:#ff006e;
  --accent2:#00c6ff;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}

body{
  background:linear-gradient(160deg,#0a0a0f,#12122a);
  color:#fff;
}

/* HEADER */
header{
  padding:16px;
  font-size:20px;
  font-weight:700;
  background:rgba(20,20,40,0.6);
  backdrop-filter:blur(20px);
  position:sticky;
  top:0;
  z-index:1000;
}

/* LAYOUT */
.layout{
  display:flex;
}

.sidebar{
  width:200px;
  background:#111122;
  padding:15px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1a1a33;
  color:#fff;
}

.main{
  flex:1;
  padding:15px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

/* GRID */
#animeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
}

.anime-card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* ADMIN */
.admin-item{
  display:flex;
  justify-content:space-between;
  background:#1a1a33;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

button{cursor:pointer;}
.btn-delete{background:#ff3c3c;}
.btn-disable{background:#ffaa00;}
</style>
</head>

<body>

<header>🔥 Anime Dashboard</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="showPage('home')">🎬 หน้าเว็บ</button>
  <button onclick="showPage('admin')">⚙️ จัดการ</button>
  <button onclick="showPage('report')">🚨 รายงาน</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="page">
  <div class="card">👥 ออนไลน์: <span id="onlineCount">0</span></div>

  <div class="card">
    <input id="searchInput" placeholder="ค้นหา..." oninput="searchAnime()">
  </div>

  <div class="card">
    <div id="animeList"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page" style="display:none">
  <div class="card">
    <h3>จัดการอนิเมะ</h3>
    <div id="adminAnimeList"></div>
  </div>
</div>

<!-- REPORT -->
<div id="report" class="page" style="display:none">
  <div class="card">
    <h3>แจ้งปัญหา</h3>
    <div id="reportList"></div>
  </div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove, update, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* NAV */
window.showPage = (id)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
};

/* LOAD ANIME */
let cards=[];
async function load(){
  const res = await fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1");
  const data = await res.json();

  const box = document.getElementById("animeList");
  box.innerHTML="";

  data.forEach(r=>{
    const div=document.createElement("div");
    div.className="anime-card";

    div.innerHTML=`
      <img src="${r.image}">
      <div>${r.title}</div>
    `;

    box.appendChild(div);
  });

  cards=[...document.querySelectorAll(".anime-card")];
}

/* SEARCH */
window.searchAnime=()=>{
  const q=document.getElementById("searchInput").value.toLowerCase();

  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? "block":"none";
  });
};

/* ADMIN SYSTEM */
onValue(ref(db,"anime"),snap=>{
  const box=document.getElementById("adminAnimeList");
  if(!box) return;

  box.innerHTML="";

  snap.forEach(c=>{
    const d=c.val();

    const div=document.createElement("div");
    div.className="admin-item";

    div.innerHTML=`
      <div>${d.title || "ไม่มีชื่อ"}</div>
      <div>
        <button class="btn-disable">ปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-disable").onclick=()=>{
      update(ref(db,"anime/"+c.key),{status:"disabled"});
    };

    div.querySelector(".btn-delete").onclick=()=>{
      if(confirm("ลบ?")){
        remove(ref(db,"anime/"+c.key));
      }
    };

    box.appendChild(div);
  });
});

/* REPORT */
onValue(ref(db,"reports"),snap=>{
  const box=document.getElementById("reportList");
  box.innerHTML="";

  snap.forEach(r=>{
    const d=r.val();

    const div=document.createElement("div");
    div.className="admin-item";

    div.innerHTML=`
      <div>${d.message}</div>
      <button class="btn-delete">ลบ</button>
    `;

    div.querySelector("button").onclick=()=>{
      remove(ref(db,"reports/"+r.key));
    };

    box.appendChild(div);
  });
});

/* ONLINE FIX */
const onlineRef = ref(db,"onlineCount");

runTransaction(onlineRef,v=>(v||0)+1);

window.addEventListener("beforeunload",()=>{
  runTransaction(onlineRef,v=>Math.max((v||1)-1,0));
});

onValue(onlineRef,snap=>{
  document.getElementById("onlineCount").textContent=snap.val()||0;
});

/* START */
load();
</script>

</body>
</html>
