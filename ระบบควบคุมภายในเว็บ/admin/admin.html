<!-- ================= HTML ================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* =========================
   LAYOUT SPLIT ADMIN
========================= */

body{
  margin:0;
  font-family:system-ui;
  background:#0b0c14;
  color:#fff;
  height:100vh;
  overflow:hidden;
}

/* ===== MAIN WRAPPER ===== */
.wrapper{
  display:flex;
  height:100vh;
}

/* =========================
   LEFT MENU
========================= */
.sidebar{
  width:280px;
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);

  display:flex;
  flex-direction:column;
  padding:14px;
  gap:10px;

  overflow-y:auto;
}

/* MENU ITEM */
.menu-item{
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);

  cursor:pointer;
  transition:0.2s;
  user-select:none;
}

.menu-item:hover{
  background:rgba(0,212,255,0.15);
  border-color:#00d4ff;
  transform:translateX(4px);
}

/* ACTIVE */
.menu-item.active{
  background:linear-gradient(90deg,#ff2e88,#00d4ff);
  color:#000;
  font-weight:bold;
}

/* =========================
   RIGHT CONTENT
========================= */
.content{
  flex:1;
  padding:16px;
  overflow-y:auto;
  background:radial-gradient(circle at top,#1a1d3a,#0b0c14 60%);
}

/* CARD INSIDE CONTENT */
.panel{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* ONLINE BOX STYLE */
.user-box{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:13px;
}

/* TOP BAR TITLE */
.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

/* =========================
   MOBILE FIX
========================= */
@media (max-width: 768px){
  .sidebar{
    width:200px;
  }
}
</style>
</head>

<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="wrapper">

  <!-- LEFT MENU -->
  <div class="sidebar">
    <div class="menu-item active" onclick="showPage('online')">👥 คนออนไลน์</div>
    <div class="menu-item" onclick="showPage('top')">🔥 Top Anime</div>
    <div class="menu-item" onclick="showPage('page')">📄 Page Stats</div>
  </div>

  <!-- RIGHT CONTENT -->
  <div class="content">

    <div id="page-online" class="panel">...</div>

    <div id="page-top" class="panel" style="display:none">...</div>

    <div id="page-page" class="panel" style="display:none">...</div>

  </div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  onDisconnect,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCUxv...",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  storageBucket: "reader-4a13f.firebasestorage.app",
  messagingSenderId: "220776049054",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */
const sid = sessionStorage.getItem("sid") || crypto.randomUUID();
sessionStorage.setItem("sid", sid);

const userRef = ref(db, "onlineUsers/" + sid);

/* ================= ADMIN MODE ================= */
const isAdmin = true; // 👈 เปิด/ปิดโหมดแอดมินตรงนี้

/* ================= HEARTBEAT ================= */
function updateUser(){
  set(userRef, {
    page: location.pathname,
    title: isAdmin ? "ADMIN" : document.title,
    time: Date.now(),
    role: isAdmin ? "admin" : "user"
  });
}

updateUser();
setInterval(updateUser, 8000);
onDisconnect(userRef).remove();

/* ================= DASHBOARD ================= */
onValue(ref(db,"onlineUsers"), (snap) => {

  const data = snap.val() || {};
  const now = Date.now();

  const box = document.getElementById("onlineList");
  const countEl = document.getElementById("onlineCount");
  const topBox = document.getElementById("topPage");
  const pageList = document.getElementById("pageList");

  if(box) box.innerHTML = "";

  let count = 0;
  const pageStats = {};
  const pageCount = {};

  /* ================= LOOP USERS ================= */
  for(let id in data){
    const u = data[id];

    // 💀 ลบคนตาย
    if(!u.time || now - u.time > 15000){
      remove(ref(db,"onlineUsers/" + id));
      continue;
    }

    // 🚫 กัน admin ออกจากระบบสถิติ
    if(u.role === "admin") continue;

    count++;

    pageStats[u.title] = (pageStats[u.title] || 0) + 1;
    pageCount[u.page] = (pageCount[u.page] || 0) + 1;

    if(box){
      box.innerHTML += `
        <div style="padding:6px;border-bottom:1px solid #333">
          👤 ${id}<br>
          📺 ${u.title}<br>
          📄 ${u.page}
        </div>
      `;
    }
  }


function showPage(page){

  document.querySelectorAll(".panel").forEach(p => {
    p.style.display = "none";
  });

  document.getElementById("page-"+page).style.display = "block";

  document.querySelectorAll(".menu-item").forEach(m=>{
    m.classList.remove("active");
  });

  event.target.classList.add("active");
}
  /* ================= ONLINE COUNT ================= */
  if(countEl){
    countEl.textContent = count;
  }

  /* ================= TOP PAGE ================= */
  if(topBox){
    topBox.innerHTML =
      "<h4>🔥 Top คนดู</h4>" +
      Object.entries(pageStats)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5)
        .map(([n,v])=>`📺 ${n} (${v})`)
        .join("<br>");
  }

  /* ================= PAGE STATS ================= */
  if(pageList){
    pageList.innerHTML =
      Object.entries(pageCount)
        .sort((a,b)=>b[1]-a[1])
        .map(([p,c])=>`📄 ${p} : ${c} คน`)
        .join("<br>");
  }

});

/* ================= CLEAN OFFLINE ================= */
window.cleanOffline = function(){
  const now = Date.now();

  onValue(ref(db,"onlineUsers"), snap=>{
    const data = snap.val() || {};

    for(let id in data){
      if(!data[id].time || now - data[id].time > 15000){
        remove(ref(db,"onlineUsers/"+id));
      }
    }

    alert("ล้างเรียบร้อย");
  }, {onlyOnce:true});
};

</script>

</body>
</html>
