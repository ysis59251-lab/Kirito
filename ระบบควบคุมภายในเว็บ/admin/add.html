<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มอนิเมะ</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:#fff;
  font-family:system-ui;
}

/* CARD */
.box{
  width:95%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

h2{
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
  outline:none;
  transition:.2s;
}

input:focus{
  background:#2a2a2a;
  transform:scale(1.02);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #ff4d6d;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 เพิ่มอนิเมะ</h2>

  <input id="anime" placeholder="ชื่อเรื่อง (Naruto)">
  <input id="name" placeholder="ชื่อแสดง (Naruto Shippuden)">
  <input id="episode" placeholder="ตอน (1)">
  <input id="title" placeholder="ชื่อตอน">
  <input id="video_url" placeholder="ลิงก์วิดีโอ m3u8">
  <input id="status" placeholder="สถานะ (กำลังฉาย)">
  <input id="desc" placeholder="คำอธิบาย">
  <input id="cover" placeholder="ลิงก์รูปปก">

  <button onclick="send()">🚀 เพิ่มตอน</button>

  <div class="status" id="statusText"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwDOan6s4VNlKgEoxXyEDi69FK2L89YeBlBgR3d6o0YKNn2h0q2fQIaZ8t8fpfZU-Q/exec";

function send(){

  const statusText = document.getElementById("statusText");

  const formData = new FormData();

  formData.append("anime", anime.value);
  formData.append("name", name.value);
  formData.append("episode", episode.value);
  formData.append("title", title.value);
  formData.append("video_url", video_url.value);
  formData.append("status", status.value);
  formData.append("desc", desc.value);
  formData.append("cover", cover.value);

  statusText.innerText = "⏳ กำลังส่ง...";

  fetch(API,{
    method:"POST",
    body: formData
  })
  .then(res => res.text())
  .then(res=>{
    statusText.innerText = "✅ เพิ่มสำเร็จ! ("+res+")";

    document.querySelectorAll("input").forEach(i=>i.value="");
  })
  .catch(err=>{
    statusText.innerText = "❌ ส่งไม่สำเร็จ";
    console.log(err);
  });
}
</script>

</body>
</html>
