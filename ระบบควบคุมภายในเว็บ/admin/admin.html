<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:linear-gradient(135deg,#0a0a0a,#121226);
  color:#fff;
  font-family:system-ui;
}

header{
  padding:18px;
  font-size:22px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.container{ padding:20px; }

.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
}

input{
  padding:10px;
  width:100%;
  max-width:400px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#fff;
}

.anime-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}

video{
  border-radius:10px;
  margin-top:5px;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

.btn-close{background:#ff9800;}
.btn-open{background:#4caf50;}
.btn-del{background:#ff3c3c;}

.topbar{
  position:fixed;
  top:15px;
  right:20px;
}

.inbox-btn{
  background:#ff006e;
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
}

.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3c3c;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

.inbox-panel{
  position:fixed;
  top:0;
  right:-380px;
  width:350px;
  height:100%;
  background:#0d0d0d;
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
}

.inbox-panel.active{ right:0; }

.message-item{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหา</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <input id="searchInput" placeholder="ค้นหา..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🚫 รายการที่ถูกปิด</h3>
  <div id="hiddenList"></div>
</div>

<div class="card">
  <h3>🏆 TOP 5</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyC...",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* ONLINE */
const uid = "admin_"+Math.random();
const onlineRef = ref(db,"onlineUsers/"+uid);
set(onlineRef,true);
onDisconnect(onlineRef).remove();

onValue(ref(db,"onlineUsers"),s=>{
  onlineCount.innerText = s.exists()?Object.keys(s.val()).length:0;
});

/* DATA */
let allAnime = [];

onValue(ref(db,"anime"),snap=>{
  allAnime=[];
  if(!snap.exists()) return;

  snap.forEach(c=>{
    const d=c.val();
    allAnime.push({
      id:c.key,
      title:d.title||"",
      video:d.video||"",
      status:d.status||"active",
      views:d.views||0
    });
  });

  renderAnime(allAnime);
  renderRanking(allAnime);
});

/* RENDER */
function renderAnime(list){
  animeList.innerHTML="";
  hiddenList.innerHTML="";

  list.forEach(a=>{
    const div=document.createElement("div");
    div.className="anime-item";

    div.innerHTML=`
    <div>
      <b>${a.title}</b><br>
      ${a.video?`<video src="${a.video}" width="200" controls></video>`:""}
    </div>
    <div>
      <button class="btn-close">ปิด</button>
      <button class="btn-open">เปิด</button>
      <button class="btn-del">ลบ</button>
    </div>
    `;

    div.querySelector(".btn-close").onclick=()=>{
      update(ref(db,"anime/"+a.id),{status:"disabled"});
    };

    div.querySelector(".btn-open").onclick=()=>{
      update(ref(db,"anime/"+a.id),{status:"active"});
    };

    div.querySelector(".btn-del").onclick=()=>{
      if(confirm("ลบ?")) remove(ref(db,"anime/"+a.id));
    };

    (a.status==="disabled"?hiddenList:animeList).appendChild(div);
  });
}

/* SEARCH */
window.searchAnime=()=>{
  const k=searchInput.value.toLowerCase();
  renderAnime(allAnime.filter(a=>a.title.toLowerCase().includes(k)));
};

/* RANK */
function renderRanking(arr){
  ranking.innerHTML="";
  [...arr].sort((a,b)=>b.views-a.views).slice(0,5)
  .forEach((a,i)=>{
    ranking.innerHTML+=`<div class="anime-item">#${i+1} ${a.title}</div>`;
  });
}

/* REPORT */
window.toggleReportPanel=()=>{
  reportPanel.classList.toggle("active");
};

onValue(ref(db,"reports"),snap=>{
  reportList.innerHTML="";
  let unread=0;

  snap.forEach(c=>{
    const d=c.val();
    if(!d.read) unread++;

    reportList.innerHTML+=`
    <div class="message-item">
      ${d.page||""} ${d.read?"✅":"🆕"}
    </div>`;
  });

  reportUnread.innerText=unread;
});

</script>
</body>
</html>
