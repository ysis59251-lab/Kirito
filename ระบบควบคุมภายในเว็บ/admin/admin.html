<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
:root{
  --bg:#0b0b14;
  --card:#141428;
  --accent:#00c6ff;
}

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:#fff;
}

/* LAYOUT */
.layout{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#111122;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1a1a33;
  color:#fff;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
}

.anime-card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* ADMIN LIST */
.admin-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  background:#1a1a33;
  padding:10px;
  border-radius:10px;
}

button{
  cursor:pointer;
}

.btn-delete{background:#ff3c3c;}
.btn-disable{background:#ffaa00;}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="show('anime')">🎬 อนิเมะ</button>
  <button onclick="show('admin')">⚙️ จัดการ</button>
  <button onclick="show('report')">🚨 รายงาน</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ANIME -->
  <div id="anime" class="page">
    <div class="card">
      👥 ออนไลน์: <span id="onlineCount">0</span>
    </div>

    <div class="card">
      <input id="search" placeholder="ค้นหา..." oninput="searchAnime()">
    </div>

    <div class="card">
      <div id="animeList" class="grid"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="page" style="display:none">
    <div class="card">
      <h3>จัดการอนิเมะ</h3>
      <div id="adminAnimeList"></div>
    </div>
  </div>

  <!-- REPORT -->
  <div id="report" class="page" style="display:none">
    <div class="card">
      <h3>แจ้งปัญหา</h3>
      <div id="reportList"></div>
    </div>
  </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove, update, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "YOUR_KEY",
  databaseURL: "YOUR_DB"
});

const db = getDatabase(app);

/* NAV */
window.show = (id)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
};

/* LOAD ANIME (SHEET) */
let cards=[];
async function load(){
  const res = await fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1");
  const data = await res.json();

  const box = document.getElementById("animeList");
  box.innerHTML="";

  data.forEach(r=>{
    const div=document.createElement("div");
    div.className="anime-card";

    div.innerHTML=`
      <img src="${r.image}">
      <div>${r.title}</div>
    `;

    box.appendChild(div);
  });

  cards=[...document.querySelectorAll(".anime-card")];
}

/* SEARCH */
window.searchAnime=()=>{
  const q=document.getElementById("search").value.toLowerCase();

  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? "block":"none";
  });
};

/* ADMIN */
onValue(ref(db,"anime"),snap=>{
  const box=document.getElementById("adminAnimeList");
  box.innerHTML="";

  snap.forEach(c=>{
    const d=c.val();

    const div=document.createElement("div");
    div.className="admin-item";

    div.innerHTML=`
      <div>${d.title}</div>
      <div>
        <button class="btn-disable">ปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-disable").onclick=()=>{
      update(ref(db,"anime/"+c.key),{status:"disabled"});
    };

    div.querySelector(".btn-delete").onclick=()=>{
      remove(ref(db,"anime/"+c.key));
    };

    box.appendChild(div);
  });
});

/* REPORT */
onValue(ref(db,"reports"),snap=>{
  const box=document.getElementById("reportList");
  box.innerHTML="";

  snap.forEach(r=>{
    const d=r.val();

    const div=document.createElement("div");
    div.className="admin-item";

    div.innerHTML=`
      <div>${d.message}</div>
      <button class="btn-delete">ลบ</button>
    `;

    div.querySelector("button").onclick=()=>{
      remove(ref(db,"reports/"+r.key));
    };

    box.appendChild(div);
  });
});

/* ONLINE FIX */
const onlineRef = ref(db,"onlineCount");

runTransaction(onlineRef,v=>(v||0)+1);

window.addEventListener("beforeunload",()=>{
  runTransaction(onlineRef,v=>Math.max((v||1)-1,0));
});

onValue(onlineRef,snap=>{
  document.getElementById("onlineCount").textContent=snap.val()||0;
});

/* START */
load();

</script>

</body>
</html>
