<!-- ================= HTML ================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* ====== (CSS ของนายเหมือนเดิม ผมไม่ตัด) ====== */
:root{
  --bg1:#0a0a0f;
  --bg2:#12122a;
  --card:rgba(255,255,255,0.05);
  --stroke:rgba(255,255,255,0.08);
  --accent:#ff006e;
  --accent2:#00c6ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:linear-gradient(160deg,#0a0a0f,#12122a);
  color:#fff;
}

header{
  padding:16px;
  background:rgba(20,20,40,0.6);
  position:sticky;
  top:0;
}

.container{padding:16px;display:flex;flex-direction:column;gap:14px;}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  padding:14px;
  border-radius:16px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#000;
  color:#fff;
  border:1px solid var(--stroke);
}

#animeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
}

.anime-card img{width:100%;height:170px;object-fit:cover;}

.btn-box{
  position:fixed;
  right:20px;
  bottom:20px;
}
</style>
</head>

<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="container">

<!-- 👥 ONLINE -->
<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
  <div id="onlineList"></div>
</div>

<div class="card">
  <div id="topPage"></div>
</div>

<div class="card">
  <button onclick="cleanOffline()">🧹 ล้างคนออฟไลน์</button>
</div>

<div class="card">
  <h4>📄 คนต่อหน้า</h4>
  <div id="pageList"></div>
</div>

<!-- 🔎 SEARCH -->
<div class="card">
  <h3>ค้นหา</h3>
  <input id="searchInput" oninput="searchAnime()">
</div>

<!-- 🎬 LIST -->
<div class="card">
  <h3>อนิเมะ</h3>
  <div id="animeList"></div>
</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  onDisconnect,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ===== CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyCUxv...",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  storageBucket: "reader-4a13f.firebasestorage.app",
  messagingSenderId: "220776049054",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== SESSION ID ===== */
const sid = sessionStorage.getItem("sid") || crypto.randomUUID();
sessionStorage.setItem("sid", sid);

const userRef = ref(db, "onlineUsers/" + sid);

/* =========================
  ONLINE UPDATE (HEARTBEAT)
========================= */
function updateUser(){
  set(userRef, {
    page: location.pathname,
    title: document.title,
    time: Date.now()
  });
}

updateUser();
setInterval(updateUser, 10000);
onDisconnect(userRef).remove();

/* =========================
  CLEAN OFFLINE USERS
========================= */
function cleanOffline(){
  const now = Date.now();

  onValue(ref(db,"onlineUsers"), (snap) => {
    const data = snap.val() || {};

    for(let id in data){
      const u = data[id];
      if(!u.time || now - u.time > 15000){
        remove(ref(db,"onlineUsers/" + id));
      }
    }

    alert("ล้างเรียบร้อย");
  }, { onlyOnce:true });
}

/* =========================
  DISPLAY DASHBOARD
========================= */
onValue(ref(db,"onlineUsers"), (snap) => {

  const data = snap.val() || {};
  const now = Date.now();

  let count = 0;

  const box = document.getElementById("onlineList");
  const countEl = document.getElementById("onlineCount");
  const topBox = document.getElementById("topPage");
  const pageList = document.getElementById("pageList");

  if(box) box.innerHTML = "";

  const pageStats = {};
  const pageCount = {};

  for(let id in data){
    const u = data[id];

    /* 💀 ลบคนค้าง */
    if(!u.time || now - u.time > 15000){
      remove(ref(db,"onlineUsers/" + id));
      continue;
    }

    count++;

    /* 📺 top anime */
    pageStats[u.title] = (pageStats[u.title] || 0) + 1;

    /* 📄 page count */
    pageCount[u.page] = (pageCount[u.page] || 0) + 1;

    if(box){
      box.innerHTML += `
        <div style="padding:6px;border-bottom:1px solid #333">
          👤 ${id}<br>
          📺 ${u.title}<br>
          📄 ${u.page}
        </div>
      `;
    }
  }

  /* =========================
    ONLINE COUNT
  ========================= */
  if(countEl){
    countEl.textContent = count;
  }

  /* =========================
    TOP ANIME
  ========================= */
  if(topBox){
    let html = "<h4>🔥 อนิเมะคนดูสด</h4>";

    Object.entries(pageStats)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .forEach(([name,val])=>{
        html += `📺 ${name} (${val})<br>`;
      });

    topBox.innerHTML = html;
  }

  /* =========================
    PAGE STATS
  ========================= */
  if(pageList){
    pageList.innerHTML = "";

    Object.entries(pageCount)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([page,count])=>{
        pageList.innerHTML += `
          📄 ${page} : ${count} คน<br>
        `;
      });
  }

});

/* =========================
  CLEAN FUNCTION GLOBAL
========================= */
window.cleanOffline = cleanOffline;

</script>

</script>

</body>
</html>
