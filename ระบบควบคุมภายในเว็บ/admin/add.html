<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มอนิเมะ</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:#fff;
  font-family:system-ui;
}

.box{
  width:95%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  color:#fff;
  cursor:pointer;
}

.lang-box{
  text-align:left;
  margin:10px 0;
}

#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111;
  padding:30px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 เพิ่มอนิเมะ</h2>

  <input id="anime" placeholder="ชื่อ id (Naruto)">
  <input id="name" placeholder="ชื่อเรื่อง">

  <select id="episode">
    <option value="">เลือกตอน</option>
    <script>
      for(let i=1;i<=30;i++){
        document.write(`<option value="${i}">ตอนที่ ${i}</option>`);
      }
    </script>
  </select>

  <div class="lang-box">
    <label><input type="checkbox" value="พากย์ไทย"> พากย์ไทย</label>
    <label><input type="checkbox" value="ซับไทย"> ซับไทย</label>
  </div>

  <input id="video_url" placeholder="ลิงก์วิดีโอ">
  <input id="status" placeholder="สถานะ">
  <input id="desc" placeholder="คำอธิบาย">
  <input id="cover" placeholder="ลิงก์รูป">

  <button onclick="send()">🚀 เพิ่มตอน</button>
</div>

<div id="popup">
  <div class="popup-box">
    <div id="popupText">⏳</div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLBavKOeoTwDw0pTg0NRojLA4rUyNII99HR6-OvHnEq_493fyiOiatj1GYjGqlZkws/exec";

async function send(){

  const btn = document.querySelector("button");

  const animeInput = document.getElementById("anime");
  const nameInput = document.getElementById("name");
  const episodeInput = document.getElementById("episode");
  const videoInput = document.getElementById("video_url");
  const statusInput = document.getElementById("status");
  const descInput = document.getElementById("desc");
  const coverInput = document.getElementById("cover");

  const popup = document.getElementById("popup");
  const text = document.getElementById("popupText");

  const langs = document.querySelectorAll('.lang-box input:checked');

  // 🔒 ล็อคปุ่ม
  btn.disabled = true;

  popup.style.display = "flex";
  text.innerText = "⏳ กำลังส่ง...";

  try{

    for(let lang of langs){

      const url = API + 
      "?anime=" + encodeURIComponent(animeInput.value) +
      "&name=" + encodeURIComponent(nameInput.value) +
      "&episode=" + episodeInput.value +
      "&title=" + encodeURIComponent(lang.value) +
      "&video_url=" + encodeURIComponent(videoInput.value) +
      "&status=" + encodeURIComponent(statusInput.value) +
      "&desc=" + encodeURIComponent(descInput.value) +
      "&cover=" + encodeURIComponent(coverInput.value);

      await new Promise(resolve=>{
        const img = new Image();
        img.src = url;
        img.onload = resolve;
        img.onerror = resolve;
      });

    }

    text.innerText = "✅ ส่งแล้ว!";

    // 🧹 ล้างค่า
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("input[type=checkbox]").forEach(i=>i.checked=false);
    episodeInput.value = "";

  }catch(e){
    text.innerText = "❌ ส่งไม่สำเร็จ";
  }

  setTimeout(()=>{
    popup.style.display = "none";
    btn.disabled = false;
  },1500);
}

function show(msg){
  const popup = document.getElementById("popup");
  const text = document.getElementById("popupText");

  popup.style.display = "flex";
  text.innerText = msg;

  setTimeout(()=>{
    popup.style.display = "none";
  },1500);
}
</script>

</body>
</html>
