<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เพิ่มอนิเมะ</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#00a844;
}
</style>
</head>

<body>

<h2>เพิ่มตอนอนิเมะ</h2>

<input id="title" placeholder="ชื่อเรื่อง"><br>
<input id="ep" type="number" placeholder="ตอน"><br>
<input id="name" placeholder="ชื่อตอน"><br>
<input id="video" placeholder="ลิงก์วิดีโอ"><br>

<button onclick="send()">เพิ่ม</button>

<script>
function send(){
  const data = {
    title: document.getElementById("title").value,
    ep: document.getElementById("ep").value,
    name: document.getElementById("name").value,
    video: document.getElementById("video").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxR3xs554uEFHozJv7XVXndJ6Wpt_-dq6ZaAY5gtn1eEE7KCJAFxulrC3p2nVbHD0B8/exec", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("เพิ่มสำเร็จ!");

    // เคลียร์ช่อง
    document.getElementById("title").value = "";
    document.getElementById("ep").value = "";
    document.getElementById("name").value = "";
    document.getElementById("video").value = "";
  });
}
</script>

</body>
</html>
