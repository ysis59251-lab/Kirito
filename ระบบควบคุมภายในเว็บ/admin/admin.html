<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:linear-gradient(135deg,#0a0a0a,#121226);
  color:#fff;
  font-family:system-ui;
}

/* HEADER */
header{
  padding:18px;
  font-size:22px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CONTAINER */
.container{
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* BUTTON */
button{
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  color:#fff;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #ff4d6d;
}

/* INPUT */
input{
  padding:10px;
  width:100%;
  max-width:400px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  background:#262626;
  box-shadow:0 0 10px #ff006e;
}

/* ANIME LIST */
.anime-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:6px;
  border-radius:10px;
  transition:0.2s;
}

.anime-item:hover{
  background:#242424;
  transform:scale(1.02);
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:15px;
  right:20px;
  z-index:999;
}

.inbox-btn{
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  box-shadow:0 0 10px #ff006e;
}

.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3c3c;
  color:#fff;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

/* PANEL */
.inbox-panel{
  position:fixed;
  top:0;
  right:-380px;
  width:350px;
  height:100%;
  background:#0d0d0d;
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
  z-index:998;
  box-shadow:-10px 0 30px rgba(0,0,0,0.8);
}

.inbox-panel.active{
  right:0;
}

/* MESSAGE */
.message-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  transition:0.2s;
}

.message-item:hover{
  background:#242424;
}

.message-actions{
  display:flex;
  gap:5px;
}

/* BUTTON COLORS */
.btn-view{ background:#2196f3; }
.btn-delete{ background:#ff3c3c; }
.btn-ban{ background:#9c27b0; }

/* ADD BUTTON */
a button{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  padding:12px 18px;
  border-radius:30px;
  box-shadow:0 0 15px #0072ff;
}
</style>
</head>
<body>

<header>🔥 Anime Admin Dashboard</header>

<a href="add.html">
  <button>ลงวิดิโอ</button>
</a>

<a href="wo.html">
  <button>ลงรูป</button>
</a>

<!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->
<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<!-- Slide Panel แจ้งปัญหา -->
<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <h3>🔎 ค้นหาอนิเมะ</h3>
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการอนิเมะ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🏆 อันดับยอดฮิต</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getDatabase, ref, set, onValue, remove, update, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",
  projectId: "darkframe300",
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= ONLINE USERS ================= */

const userId = "admin_" + Math.random().toString(36).slice(2);
const onlineRef = ref(db, "onlineUsers/" + userId);

set(onlineRef, true);
onDisconnect(onlineRef).remove();

onValue(ref(db, "onlineUsers"), (snap)=>{
  document.getElementById("onlineCount").innerText =
    snap.exists() ? Object.keys(snap.val()).length : 0;
});

/* ================= ANIME ================= */

let allAnime = [];

onValue(ref(db, "anime"), (snap)=>{
  const container = document.getElementById("animeList");

  if(!snap.exists()){
    container.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  allAnime = [];

  snap.forEach(child=>{
    const data = child.val();
    allAnime.push({
      id: child.key,
      title: data.title || "ไม่มีชื่อ",
      status: data.status || "active",
      views: data.views || 0
    });
  });

  renderAnime(allAnime);
  renderRanking(allAnime);
});

/* ===== render anime ===== */

function renderAnime(list){
  const container = document.getElementById("animeList");
  container.innerHTML = "";

  list.forEach(data=>{
    const div = document.createElement("div");
    div.className = "anime-item";

    div.innerHTML = `
      ${data.title} (${data.status})
      <div>
        <button style="background:#ff9800">ปิด</button>
        <button style="background:#ff3c3c">ลบ</button>
      </div>
    `;

    div.children[1].children[0].onclick = ()=> disableAnime(data.id);
    div.children[1].children[1].onclick = ()=> deleteAnime(data.id);

    container.appendChild(div);
  });
}

/* ===== search ===== */

window.searchAnime = function(){
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allAnime.filter(a =>
    a.title.toLowerCase().includes(keyword)
  );
  renderAnime(filtered);
};

/* ===== actions ===== */

function disableAnime(id){
  update(ref(db, "anime/"+id), {status:"disabled"});
}

function deleteAnime(id){
  if(confirm("ลบเรื่องนี้?")){
    remove(ref(db, "anime/"+id));
  }
}

/* ================= RANKING ================= */

function renderRanking(arr){
  const sorted = [...arr].sort((a,b)=> b.views - a.views);
  const container = document.getElementById("ranking");

  container.innerHTML="";

  sorted.slice(0,5).forEach((anime,i)=>{
    container.innerHTML += `
      <div class="anime-item">
        #${i+1} ${anime.title} (${anime.views} views)
      </div>
    `;
  });
}

/* ================= REPORT ================= */

window.toggleReportPanel = function(){
  document.getElementById("reportPanel").classList.toggle("active");
};

let lastReportCount = 0;

onValue(ref(db,"reports"),(snapshot)=>{

  const container = document.getElementById("reportList");
  const badge = document.getElementById("reportUnread");

  container.innerHTML = "";

  if(!snapshot.exists()){
    container.innerHTML = "ไม่มีรายงาน";
    badge.innerText = 0;
    return;
  }

  let unread = 0;
  let count = 0;

  const reports = [];

  snapshot.forEach(child=>{
    reports.push({
      id: child.key,
      ...child.val()
    });
  });

  reports.reverse();

  reports.forEach(data=>{

    count++;
    if(!data.read) unread++;

    const div = document.createElement("div");
    div.className = "message-item";

    div.innerHTML = `
      <div>
        <b>${data.page || "ไม่ทราบหน้า"}</b>
        ${data.read ? "✅" : "🆕"}<br>
        <small>${data.time ? new Date(data.time).toLocaleString() : "-"}</small>
      </div>
      <div class="message-actions">
        <button class="btn-view">เปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-view").onclick = () => {
      alert(
        "หน้า: "+(data.page||"-")+
        "\n\nรายละเอียด:\n"+(data.detail||"-")+
        "\n\nเวลา: "+(data.time ? new Date(data.time).toLocaleString() : "-")
      );

      update(ref(db,"reports/"+data.id),{read:true});
    };

    div.querySelector(".btn-delete").onclick = () => {
      if(confirm("ลบรายงานนี้?")){
        remove(ref(db,"reports/"+data.id));
      }
    };

    container.appendChild(div);
  });

  badge.innerText = unread;

  if(count > lastReportCount){
    const sound = document.getElementById("notifySound");
    sound.play().catch(()=>{});
  }

  lastReportCount = count;
});

</script>

</body>
</html>
