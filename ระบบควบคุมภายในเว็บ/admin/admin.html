<!-- ================= HTML ================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* =========================
   MODERN ANIME ADMIN UI
========================= */

:root{
  --bg:#0b0c14;
  --bg2:#11132a;

  --card:rgba(255,255,255,0.06);
  --card2:rgba(255,255,255,0.1);

  --stroke:rgba(255,255,255,0.12);

  --text:#eaeaf2;
  --muted:#9aa0b4;

  --accent:#ff2e88;
  --accent2:#00d4ff;

  --good:#00ff9d;
  --warn:#ffcc00;
  --bad:#ff4d4d;

  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,0.45);
}

/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, sans-serif;
}

body{
  background:radial-gradient(circle at top, #1a1d3a, var(--bg) 60%);
  color:var(--text);
  min-height:100vh;
}

/* =========================
   HEADER
========================= */
header{
  position:sticky;
  top:0;
  z-index:100;

  padding:16px;
  font-weight:700;
  letter-spacing:0.5px;

  background:rgba(10,10,20,0.75);
  backdrop-filter: blur(12px);
  border-bottom:1px solid var(--stroke);
}

/* =========================
   LAYOUT
========================= */
.container{
  max-width:1200px;
  margin:auto;
  padding:16px;

  display:flex;
  flex-direction:column;
  gap:16px;
}

/* =========================
   CARD (GLASS UI)
========================= */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);

  transition:0.25s ease;
}

.card:hover{
  background:var(--card2);
  transform:translateY(-2px);
}

/* =========================
   INPUT
========================= */
input{
  width:100%;
  padding:12px 14px;

  border-radius:12px;
  border:1px solid var(--stroke);

  background:#0d0f1f;
  color:var(--text);

  outline:none;
  transition:0.2s ease;
}

input:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 3px rgba(0,212,255,0.15);
}

/* =========================
   ANIME GRID
========================= */
#animeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;
}

/* =========================
   ANIME CARD
========================= */
.anime-card{
  border-radius:14px;
  overflow:hidden;

  background:#0f111f;
  border:1px solid var(--stroke);

  cursor:pointer;
  transition:0.25s ease;
  position:relative;
}

.anime-card:hover{
  transform:scale(1.05);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  border-color:var(--accent2);
}

.anime-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

/* =========================
   OVERLAY TITLE
========================= */
.anime-card .overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;

  padding:6px;
  font-size:12px;
  text-align:center;

  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* =========================
   ONLINE BADGE COLORS
========================= */
.good{color:var(--good);}
.warn{color:var(--warn);}
.bad{color:var(--bad);}

/* =========================
   BUTTON FIX BOX
========================= */
.btn-box{
  position:fixed;
  right:16px;
  bottom:16px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* =========================
   SCROLLBAR
========================= */
::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#0a0a14;
}

::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="container">

<!-- 👥 ONLINE -->
<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
  <div id="onlineList"></div>
</div>

<div class="card">
  <div id="topPage"></div>
</div>

<div class="card">
  <h4>📄 คนต่อหน้า</h4>
  <div id="pageList"></div>
</div>

<!-- 🔎 SEARCH -->
<div class="card">
  <h3>ค้นหา</h3>
  <input id="searchInput" oninput="searchAnime()">
</div>

<!-- 🎬 LIST -->
<div class="card">
  <h3>อนิเมะ</h3>
  <div id="animeList"></div>
</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  set,
  onDisconnect,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCUxv...",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  storageBucket: "reader-4a13f.firebasestorage.app",
  messagingSenderId: "220776049054",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */
const sid = sessionStorage.getItem("sid") || crypto.randomUUID();
sessionStorage.setItem("sid", sid);

const userRef = ref(db, "onlineUsers/" + sid);

/* ================= ADMIN MODE ================= */
const isAdmin = true; // 👈 เปิด/ปิดโหมดแอดมินตรงนี้

/* ================= HEARTBEAT ================= */
function updateUser(){
  set(userRef, {
    page: location.pathname,
    title: isAdmin ? "ADMIN" : document.title,
    time: Date.now(),
    role: isAdmin ? "admin" : "user"
  });
}

updateUser();
setInterval(updateUser, 8000);
onDisconnect(userRef).remove();

/* ================= DASHBOARD ================= */
onValue(ref(db,"onlineUsers"), (snap) => {

  const data = snap.val() || {};
  const now = Date.now();

  const box = document.getElementById("onlineList");
  const countEl = document.getElementById("onlineCount");
  const topBox = document.getElementById("topPage");
  const pageList = document.getElementById("pageList");

  if(box) box.innerHTML = "";

  let count = 0;
  const pageStats = {};
  const pageCount = {};

  /* ================= LOOP USERS ================= */
  for(let id in data){
    const u = data[id];

    // 💀 ลบคนตาย
    if(!u.time || now - u.time > 15000){
      remove(ref(db,"onlineUsers/" + id));
      continue;
    }

    // 🚫 กัน admin ออกจากระบบสถิติ
    if(u.role === "admin") continue;

    count++;

    pageStats[u.title] = (pageStats[u.title] || 0) + 1;
    pageCount[u.page] = (pageCount[u.page] || 0) + 1;

    if(box){
      box.innerHTML += `
        <div style="padding:6px;border-bottom:1px solid #333">
          👤 ${id}<br>
          📺 ${u.title}<br>
          📄 ${u.page}
        </div>
      `;
    }
  }

  /* ================= ONLINE COUNT ================= */
  if(countEl){
    countEl.textContent = count;
  }

  /* ================= TOP PAGE ================= */
  if(topBox){
    topBox.innerHTML =
      "<h4>🔥 Top คนดู</h4>" +
      Object.entries(pageStats)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5)
        .map(([n,v])=>`📺 ${n} (${v})`)
        .join("<br>");
  }

  /* ================= PAGE STATS ================= */
  if(pageList){
    pageList.innerHTML =
      Object.entries(pageCount)
        .sort((a,b)=>b[1]-a[1])
        .map(([p,c])=>`📄 ${p} : ${c} คน`)
        .join("<br>");
  }

});

/* ================= CLEAN OFFLINE ================= */
window.cleanOffline = function(){
  const now = Date.now();

  onValue(ref(db,"onlineUsers"), snap=>{
    const data = snap.val() || {};

    for(let id in data){
      if(!data[id].time || now - data[id].time > 15000){
        remove(ref(db,"onlineUsers/"+id));
      }
    }

    alert("ล้างเรียบร้อย");
  }, {onlyOnce:true});
};

</script>

</body>
</html>
