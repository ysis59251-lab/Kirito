<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มอนิเมะ</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:#fff;
  font-family:system-ui;
}

/* CARD */
.box{
  width:95%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

h2{
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
  outline:none;
  transition:.2s;
}

input:focus{
  background:#2a2a2a;
  transform:scale(1.02);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #ff4d6d;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 เพิ่มอนิเมะ</h2>

  <input id="anime" placeholder="ชื่อ id (Naruto)">
  <input id="name" placeholder="ชื่อเรื่อง (Naruto Shippuden)">
  <input id="episode" placeholder="ตอน (1)">
  <input id="title" placeholder="ภาษา">
  <input id="video_url" placeholder="ลิงก์วิดีโอ m3u8">
  <input id="status" placeholder="สถานะ (กำลังฉาย)">
  <input id="desc" placeholder="คำอธิบาย">
  <input id="cover" placeholder="ลิงก์รูปปก">

  <button onclick="send()">🚀 เพิ่มตอน</button>

  <div class="status" id="statusText"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLBavKOeoTwDw0pTg0NRojLA4rUyNII99HR6-OvHnEq_493fyiOiatj1GYjGqlZkws/exec";

function send(){

  const statusText = document.getElementById("statusText");

  // เช็คก่อนส่ง
  if(!anime.value || !name.value){
    statusText.innerText = "⚠️ กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  // แสดงสถานะกำลังส่ง
  statusText.innerText = "⏳ กำลังส่ง...";
  
  const url = API + 
  "?anime=" + encodeURIComponent(anime.value) +
  "&name=" + encodeURIComponent(name.value) +
  "&episode=" + encodeURIComponent(episode.value) +
  "&title=" + encodeURIComponent(title.value) +
  "&video_url=" + encodeURIComponent(video_url.value) +
  "&status=" + encodeURIComponent(status.value) +
  "&desc=" + encodeURIComponent(desc.value) +
  "&cover=" + encodeURIComponent(cover.value);

  // ยิงแบบไม่เปิดหน้าใหม่
  fetch(url)
  .then(res => res.text())
  .then(res => {

    if(res.includes("OK")){
      statusText.innerText = "✅ เพิ่มสำเร็จ!";
      
      // ล้าง input
      document.querySelectorAll("input").forEach(i=>i.value="");
    } else {
      statusText.innerText = "❌ มีปัญหา: " + res;
    }

  })
  .catch(err=>{
    statusText.innerText = "❌ ส่งไม่สำเร็จ (เน็ตหรือ API)";
    console.log(err);
  });
}
</script>

</body>
</html>
