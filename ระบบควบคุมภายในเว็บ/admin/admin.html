<!DOCTYPE html>  <html lang="th">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Anime Admin Dashboard</title>

<style>  
:root{
  --bg1:#0a0a0f;
  --bg2:#12122a;
  --card:rgba(255,255,255,0.05);
  --stroke:rgba(255,255,255,0.08);
  --accent:#ff006e;
  --accent2:#00c6ff;
}

/* ================= BASE ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: 'Segoe UI', system-ui;
}

body{
  background:linear-gradient(160deg,#0a0a0f,#12122a);
  color:#fff;
  overflow-x:hidden;
}

/* glow background */
body::before{
  content:"";
  position:fixed;
  width:700px;
  height:700px;
  background:radial-gradient(circle,#ff006e33,transparent 70%);
  top:-200px;
  left:-200px;
  filter:blur(80px);
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#00c6ff22,transparent 70%);
  bottom:-200px;
  right:-200px;
  filter:blur(80px);
  z-index:-1;
}

/* ================= HEADER ================= */
header{
  padding:18px;
  font-size:20px;
  font-weight:700;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--stroke);
  position:sticky;
  top:0;
  z-index:10;
}

/* ================= CONTAINER ================= */
.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(18px);
  border-radius:16px;
  padding:16px;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  height:2px;
  width:100%;
  top:0;
  left:0;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  opacity:0.6;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* ================= INPUT ================= */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,0.4);
  color:#fff;
  outline:none;
  transition:0.25s;
}

input:focus{
  border-color:var(--accent);
  box-shadow:0 0 12px rgba(255,0,110,0.5);
}

/* ================= BUTTON ================= */
button{
  border:none;
  cursor:pointer;
  padding:8px 12px;
  border-radius:10px;
  font-weight:600;
  color:#fff;
  transition:0.2s;
}

button:hover{
  transform:scale(1.06);
}

.btn-delete{
  background:#ff3c3c;
}

.btn-disable{
  background:#ff9800;
}

/* ================= GRID ================= */
#animeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
}

/* ================= ANIME CARD ================= */
.anime-card{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:#000;
  text-decoration:none;
  color:#fff;
}

.anime-card img{
  width:100%;
  height:170px;
  object-fit:cover;
  transition:0.35s;
}

.anime-card:hover img{
  transform:scale(1.12);
  filter:brightness(0.5);
}

/* overlay */
.anime-card div{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  font-size:12px;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
}

/* ================= TOPBAR ================= */
.topbar{
  position:fixed;
  top:15px;
  right:15px;
}

.inbox-btn{
  background:linear-gradient(45deg,var(--accent),#ff4d6d);
  padding:12px;
  border-radius:50%;
  box-shadow:0 0 15px rgba(255,0,110,0.6);
}

.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  font-size:11px;
  padding:4px 6px;
  border-radius:50%;
}

/* ================= PANEL ================= */
.inbox-panel{
  position:fixed;
  top:0;
  right:-100%;
  width:320px;
  height:100%;
  background:rgba(10,10,20,0.95);
  backdrop-filter:blur(20px);
  transition:0.35s;
  padding:15px;
}

.inbox-panel.active{
  right:0;
}

/* ================= FLOAT BUTTON ================= */
.btn-box{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn-box button{
  background:linear-gradient(45deg,var(--accent2),#0072ff);
  border-radius:30px;
  padding:12px;
  box-shadow:0 0 12px rgba(0,114,255,0.5);
}

/* ================= MOBILE OPT ================= */
@media(max-width:500px){
  header{
    font-size:18px;
  }

  .anime-card img{
    height:150px;
  }
}  
</style> 
</head>  
<body>  

<header>🔥 Anime Admin Dashboard</header>  <div class="btn-box">  
  <a href="add.html"><button>ลงวิดิโอ</button></a>  
  <a href="wo.html"><button>ลงรูป</button></a>  
</div>  <!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->  <div class="topbar">  
  <div class="inbox-btn" onclick="toggleReportPanel()">  
    🚨  
    <span id="reportUnread" class="inbox-badge">0</span>  
  </div>  
</div>  <!-- Slide Panel แจ้งปัญหา -->  <div id="reportPanel" class="inbox-panel">  
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>  
  <div id="reportList"></div>  
</div>  <div class="container">  <div class="card">  
  👥 คนออนไลน์: <span id="onlineCount">0</span>  
</div>  <div class="card">  
  <h3>🔎 ค้นหาอนิเมะ</h3>  
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">  
</div>  <div class="card">  
  <h3>🎬 รายการอนิเมะ</h3>  
  <div id="animeList"></div>  
</div>  <div class="card">  
  <h3>🏆 อันดับยอดฮิต</h3>  
  <div id="ranking"></div>  
</div>  </div>  <audio id="notifySound">  
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">  
</audio>  <script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
import {  
  getDatabase,  
  ref,  
  onValue,  
  remove,  
  update,  
  runTransaction  
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";  
  
/* ================= FIREBASE ================= */  
const adminApp = initializeApp({  
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",  
  authDomain: "darkframe300.firebaseapp.com",  
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",  
  projectId: "darkframe300",  
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"  
});  
  
const adminDb = getDatabase(adminApp);  
  
/* ================= ELEMENTS ================= */  
const adminBox = document.getElementById("adminAnimeList");  
const readerBox = document.getElementById("animeList");  
const reportList = document.getElementById("reportList");  
const badge = document.getElementById("reportUnread");  
  
/* ================= STATE ================= */  
let cards = [];  
let currentPage = 0;  
const perPage = 40;  
let searchMode = false;  
  
/* ================= ADMIN SYSTEM ================= */  
onValue(ref(adminDb, "anime"), (snap) => {  
  adminBox.innerHTML = "";  
  
  if (!snap.exists()) {  
    adminBox.innerHTML = "ไม่มีข้อมูล";  
    return;  
  }  
  
  snap.forEach(c => {  
    const d = c.val();  
  
    const div = document.createElement("div");  
    div.className = "anime-item";  
  
    div.innerHTML = `  
      <div>${d.title || "ไม่มีชื่อ"} (${d.status || "active"})</div>  
      <div>  
        <button class="btn-disable">ปิด</button>  
        <button class="btn-delete">ลบ</button>  
      </div>  
    `;  
  
    div.querySelector(".btn-disable").onclick = () =>  
      update(ref(adminDb, "anime/" + c.key), { status: "disabled" });  
  
    div.querySelector(".btn-delete").onclick = () => {  
      if (confirm("ลบ?")) {  
        remove(ref(adminDb, "anime/" + c.key));  
      }  
    };  
  
    adminBox.appendChild(div);  
  });  
});  
  
/* ================= LOAD SHEET ================= */  
async function loadFromSheet() {  
  const res = await fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1");  
  const data = await res.json();  
  
  readerBox.innerHTML = "";  
  
  data.forEach(row => {  
    const a = document.createElement("a");  
    a.className = "anime-card";  
    a.href = row.link || "#";  
  
    a.innerHTML = `  
      <img src="${row.image || 'https://via.placeholder.com/300'}">  
      <div>${row.title || ""}</div>  
    `;  
  
    readerBox.appendChild(a);  
  });  
  
  cards = [...document.querySelectorAll(".anime-card")];  
  currentPage = 0;  
  searchMode = false;  
  renderPage();  
}  
  
/* ================= PAGINATION ================= */  
function renderPage() {  
  const list = searchMode ? getVisibleCards() : cards;  
  
  const start = currentPage * perPage;  
  const end = start + perPage;  
  
  list.forEach(c => c.style.display = "none");  
  list.slice(start, end).forEach(c => c.style.display = "inline-block");  
}  
  
function getVisibleCards() {  
  return cards.filter(c => c.style.display !== "none");  
}  
  
window.nextPage = function () {  
  const list = searchMode ? getVisibleCards() : cards;  
  const max = Math.ceil(list.length / perPage) - 1;  
  
  if (currentPage < max) {  
    currentPage++;  
    renderPage();  
  }  
};  
  
window.prevPage = function () {  
  if (currentPage > 0) {  
    currentPage--;  
    renderPage();  
  }  
};  
  
/* ================= SEARCH (FIX ไม่พัง pagination) ================= */  
window.searchAnime = function () {  
  const q = document.getElementById("searchInput").value.toLowerCase();  
  
  if (!q) {  
    searchMode = false;  
    currentPage = 0;  
    renderPage();  
    return;  
  }  
  
  searchMode = true;  
  
  cards.forEach(c => {  
    const text = c.innerText.toLowerCase();  
    c.style.display = text.includes(q) ? "inline-block" : "none";  
  });  
  
  currentPage = 0;  
  renderPage();  
};  
  
/* ================= REPORT ================= */  
onValue(ref(adminDb, "reports"), (snap) => {  
  reportList.innerHTML = "";  
  
  let count = 0;  
  
  snap.forEach(r => {  
    const d = r.val();  
    count++;  
  
    const div = document.createElement("div");  
    div.className = "message-item";  
  
    div.innerHTML = `  
      <div>${d.message || "report"}</div>  
      <button class="btn-delete">ลบ</button>  
    `;  
  
    div.querySelector("button").onclick = () =>  
      remove(ref(adminDb, "reports/" + r.key));  
  
    reportList.appendChild(div);  
  });  
  
  badge.textContent = count;  
});  
  
/* ================= ONLINE ================= */  
runTransaction(ref(adminDb, "onlineCount"), (v) => (v || 0) + 1);  
  
/* ================= START ================= */  
document.addEventListener("DOMContentLoaded",
loadFromSheet);  

</script> 

 </body>  
</html>
