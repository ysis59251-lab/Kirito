<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
:root{
  --bg1:#0a0a0f;
  --bg2:#12122a;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.08);
  --accent:#ff006e;
  --accent2:#00c6ff;
}

/* ================= BASE ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui;
}

body{
  background:radial-gradient(circle at top,#1a1a2e 0%, var(--bg1) 60%);
  color:#fff;
  overflow-x:hidden;
}

/* glow background effect */
body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#ff006e33,transparent 70%);
  top:-200px;
  left:-200px;
  filter:blur(60px);
  z-index:-1;
}

/* ================= HEADER ================= */
header{
  padding:20px;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--stroke);
  position:sticky;
  top:0;
  z-index:10;
}

/* ================= CONTAINER ================= */
.container{
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ================= CARD (glass premium) ================= */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:2px;
  top:0;
  left:0;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  opacity:0.6;
}

.card:hover{
  transform:translateY(-5px);
}

/* ================= INPUT ================= */
input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,0.3);
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:var(--accent);
  box-shadow:0 0 15px rgba(255,0,110,0.4);
}

/* ================= BUTTON ================= */
button{
  border:none;
  cursor:pointer;
  padding:8px 14px;
  border-radius:10px;
  font-weight:600;
  transition:0.2s;
  color:#fff;
}

button:hover{
  transform:scale(1.05);
}

/* action buttons */
.btn-disable{ background:#ff9800; }
.btn-delete{ background:#ff3c3c; }

/* ================= ANIME LIST ADMIN ================= */
#adminAnimeList{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.anime-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--stroke);
  transition:0.2s;
}

.anime-item:hover{
  background:rgba(255,255,255,0.08);
  transform:scale(1.01);
}

/* ================= READER GRID ================= */
#readerAnimeList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
}

/* ================= ANIME CARD (OVERLAY STYLE) ================= */
.anime-card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  color:#fff;
  background:#000;
  transform:translateZ(0);
}

.anime-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
  transition:0.3s;
}

.anime-card:hover img{
  transform:scale(1.1);
  filter:brightness(0.6);
}

/* overlay text */
.anime-card div{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
  font-size:13px;
}

/* ================= TOP BUTTON ================= */
.topbar{
  position:fixed;
  top:15px;
  right:15px;
  z-index:1000;
}

.inbox-btn{
  background:linear-gradient(45deg,var(--accent),#ff4d6d);
  padding:12px 16px;
  border-radius:50px;
  box-shadow:0 0 20px rgba(255,0,110,0.4);
}

/* badge */
.inbox-badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff2d2d;
  padding:4px 7px;
  border-radius:50%;
  font-size:11px;
}

/* ================= SLIDE PANEL ================= */
.inbox-panel{
  position:fixed;
  top:0;
  right:-400px;
  width:360px;
  height:100%;
  background:rgba(10,10,20,0.95);
  backdrop-filter:blur(20px);
  border-left:1px solid var(--stroke);
  transition:0.35s;
  z-index:999;
  padding:20px;
}

.inbox-panel.active{
  right:0;
}

.message-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  margin-bottom:8px;
}

/* ================= FLOAT BUTTON ================= */
.btn-box{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn-box button{
  background:linear-gradient(45deg,var(--accent2),#0072ff);
  border-radius:30px;
  padding:12px 16px;
  box-shadow:0 0 15px rgba(0,114,255,0.4);
}
</style>
</head>
<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="btn-box">
  <a href="add.html"><button>ลงวิดิโอ</button></a>
  <a href="wo.html"><button>ลงรูป</button></a>
</div>

<!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->
<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<!-- Slide Panel แจ้งปัญหา -->
<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <h3>🔎 ค้นหาอนิเมะ</h3>
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการอนิเมะ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🏆 อันดับยอดฮิต</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue,
  remove,
  update,
  onDisconnect,
  push,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const adminApp = initializeApp({
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",
  projectId: "darkframe300",
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"
}, "admin");

const adminDb = getDatabase(adminApp);

/* (กันพัง) reader config ต้องมีของจริง */
const readerApp = initializeApp({
  apiKey: "AIzaSyCUxvXXXX",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
}, "reader");

const readerDb = getDatabase(readerApp);

/* ================= UI FIX ================= */
const adminBox = document.createElement("div");
adminBox.id = "adminAnimeList";
document.body.appendChild(adminBox);

const readerBox = document.createElement("div");
readerBox.id = "readerAnimeList";
document.querySelector(".container").appendChild(readerBox);

/* ================= ADMIN LIST ================= */
onValue(ref(adminDb, "anime"), (snap) => {
  adminBox.innerHTML = "";

  if (!snap.exists()) {
    adminBox.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snap.forEach(c => {
    const d = c.val();

    const div = document.createElement("div");
    div.className = "anime-item";

    div.innerHTML = `
      <div>
        ${d.title || "ไม่มีชื่อ"} (${d.status || "active"})
      </div>
      <div>
        <button class="btn-disable">ปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-disable").onclick = () =>
      update(ref(adminDb, "anime/" + c.key), { status: "disabled" });

    div.querySelector(".btn-delete").onclick = () => {
      if (confirm("ลบ?")) {
        remove(ref(adminDb, "anime/" + c.key));
      }
    };

    adminBox.appendChild(div);
  });
});

/* ================= READER ================= */
let cards = [];

function loadFromSheet() {
  fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1")
    .then(r => r.json())
    .then(data => {

      readerBox.innerHTML = "";

      data.forEach((row, i) => {
        const a = document.createElement("a");
        a.className = "anime-card";
        a.href = row.link || "#";

        a.innerHTML = `
          <div class="card-img">
            <img src="${row.image || 'https://via.placeholder.com/300'}">
          </div>
          <div style="text-align:center">${row.title || ""}</div>
        `;

        readerBox.appendChild(a);
      });

      cards = [...document.querySelectorAll(".anime-card")];
      renderPage();
    });
}

/* pagination fix */
function renderPage(page = 0) {
  const perPage = 40;
  const start = page * perPage;
  const end = start + perPage;

  cards.forEach(c => c.style.display = "none");
  cards.slice(start, end).forEach(c => c.style.display = "inline-block");
}

/* ================= SEARCH ================= */
window.searchAnime = function () {
  const q = document.getElementById("searchInput").value.toLowerCase();

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(q) ? "inline-block" : "none";
  });
};

/* ================= REPORT PANEL ================= */
window.toggleReportPanel = function () {
  document.getElementById("reportPanel")
    .classList.toggle("active");
};

/* fake report system (กัน error) */
onValue(ref(adminDb, "reports"), (snap) => {
  const list = document.getElementById("reportList");
  const badge = document.getElementById("reportUnread");

  list.innerHTML = "";

  let count = 0;

  snap.forEach(r => {
    const d = r.val();
    count++;

    const div = document.createElement("div");
    div.className = "message-item";

    div.innerHTML = `
      <div>${d.message || "report"}</div>
      <button class="btn-delete">ลบ</button>
    `;

    div.querySelector("button").onclick = () =>
      remove(ref(adminDb, "reports/" + r.key));

    list.appendChild(div);
  });

  badge.textContent = count;
});

/* ================= ONLINE COUNT ================= */
const onlineRef = ref(adminDb, "onlineCount");

runTransaction(onlineRef, (val) => (val || 0) + 1);

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", () => {
  loadFromSheet();
});
</script>

</body>
</html>
