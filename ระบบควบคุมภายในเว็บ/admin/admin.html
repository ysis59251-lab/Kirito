<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
/* =========================
   RESET / BASE
========================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:system-ui;
  background:linear-gradient(135deg,#0a0a0a,#121226);
  color:#fff;
}

/* =========================
   HEADER
========================= */
header{
  padding:18px;
  font-size:22px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* =========================
   LAYOUT
========================= */
.container{
  padding:20px;
}

/* =========================
   CARD UI
========================= */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* =========================
   INPUT
========================= */
input{
  padding:10px;
  width:100%;
  max-width:400px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  background:#262626;
  box-shadow:0 0 10px #ff006e;
}

/* =========================
   BUTTON (GLOBAL)
========================= */
button{
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  color:#fff;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #ff4d6d;
}

/* =========================
   ANIME LIST (ADMIN)
========================= */
.anime-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:6px;
  border-radius:10px;
  transition:0.2s;
}

.anime-item:hover{
  background:#242424;
  transform:scale(1.02);
}

/* =========================
   ANIME CARD (READER)
========================= */
.anime-card{
  display:inline-block;
  margin:10px;
  border-radius:12px;
  overflow:hidden;
}

.card-img img{
  width:100%;
  max-width:180px;
  height:110px;
  object-fit:cover;
  border-radius:12px;
}

/* =========================
   TOP BAR (REPORT BUTTON)
========================= */
.topbar{
  position:fixed;
  top:15px;
  right:20px;
  z-index:999;
}

.inbox-btn{
  background:linear-gradient(45deg,#ff4d6d,#ff006e);
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  box-shadow:0 0 10px #ff006e;
}

.inbox-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3c3c;
  color:#fff;
  border-radius:50%;
  padding:3px 7px;
  font-size:12px;
}

/* =========================
   SLIDE PANEL
========================= */
.inbox-panel{
  position:fixed;
  top:0;
  right:-380px;
  width:350px;
  height:100%;
  background:#0d0d0d;
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
  z-index:998;
  box-shadow:-10px 0 30px rgba(0,0,0,0.8);
}

.inbox-panel.active{
  right:0;
}

/* =========================
   MESSAGE ITEM
========================= */
.message-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
}

.message-item:hover{
  background:#242424;
}

/* =========================
   BUTTON COLORS
========================= */
.btn-view{ background:#2196f3; }
.btn-delete{ background:#ff3c3c; }
.btn-ban{ background:#9c27b0; }

/* =========================
   FLOAT BUTTON BOX
========================= */
.btn-box{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.btn-box button{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  padding:12px 18px;
  border-radius:30px;
  box-shadow:0 0 15px #0072ff;
}
</style>
</head>
<body>

<header>🔥 Anime Admin Dashboard</header>

<div class="btn-box">
  <a href="add.html"><button>ลงวิดิโอ</button></a>
  <a href="wo.html"><button>ลงรูป</button></a>
</div>

<!-- 🔝 ปุ่มแจ้งปัญหาขวาบน -->
<div class="topbar">
  <div class="inbox-btn" onclick="toggleReportPanel()">
    🚨
    <span id="reportUnread" class="inbox-badge">0</span>
  </div>
</div>

<!-- Slide Panel แจ้งปัญหา -->
<div id="reportPanel" class="inbox-panel">
  <h3>🚨 แจ้งปัญหาจากผู้ชม</h3>
  <div id="reportList"></div>
</div>

<div class="container">

<div class="card">
  👥 คนออนไลน์: <span id="onlineCount">0</span>
</div>

<div class="card">
  <h3>🔎 ค้นหาอนิเมะ</h3>
  <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่อง..." oninput="searchAnime()">
</div>

<div class="card">
  <h3>🎬 รายการอนิเมะ</h3>
  <div id="animeList"></div>
</div>

<div class="card">
  <h3>🏆 อันดับยอดฮิต</h3>
  <div id="ranking"></div>
</div>

</div>

<audio id="notifySound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue,
  remove,
  update,
  onDisconnect,
  push,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const adminApp = initializeApp({
  apiKey: "AIzaSyC1S1BToUhVmWqyeTWbHlPdI8hY0aGKNDg",
  authDomain: "darkframe300.firebaseapp.com",
  databaseURL: "https://darkframe300-default-rtdb.firebaseio.com",
  projectId: "darkframe300",
  appId: "1:296568248360:web:7867a60675ce32e3d6bd1d"
}, "admin");

const adminDb = getDatabase(adminApp);

/* (กันพัง) reader config ต้องมีของจริง */
const readerApp = initializeApp({
  apiKey: "AIzaSyCUxvXXXX",
  authDomain: "reader-4a13f.firebaseapp.com",
  databaseURL: "https://reader-4a13f-default-rtdb.firebaseio.com",
  projectId: "reader-4a13f",
  appId: "1:220776049054:web:53524fb1e90ba83a12ce8f"
}, "reader");

const readerDb = getDatabase(readerApp);

/* ================= UI FIX ================= */
const adminBox = document.createElement("div");
adminBox.id = "adminAnimeList";
document.body.appendChild(adminBox);

const readerBox = document.createElement("div");
readerBox.id = "readerAnimeList";
document.querySelector(".container").appendChild(readerBox);

/* ================= ADMIN LIST ================= */
onValue(ref(adminDb, "anime"), (snap) => {
  adminBox.innerHTML = "";

  if (!snap.exists()) {
    adminBox.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  snap.forEach(c => {
    const d = c.val();

    const div = document.createElement("div");
    div.className = "anime-item";

    div.innerHTML = `
      <div>
        ${d.title || "ไม่มีชื่อ"} (${d.status || "active"})
      </div>
      <div>
        <button class="btn-disable">ปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-disable").onclick = () =>
      update(ref(adminDb, "anime/" + c.key), { status: "disabled" });

    div.querySelector(".btn-delete").onclick = () => {
      if (confirm("ลบ?")) {
        remove(ref(adminDb, "anime/" + c.key));
      }
    };

    adminBox.appendChild(div);
  });
});

/* ================= READER ================= */
let cards = [];

function loadFromSheet() {
  fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1")
    .then(r => r.json())
    .then(data => {

      readerBox.innerHTML = "";

      data.forEach((row, i) => {
        const a = document.createElement("a");
        a.className = "anime-card";
        a.href = row.link || "#";

        a.innerHTML = `
          <div class="card-img">
            <img src="${row.image || 'https://via.placeholder.com/300'}">
          </div>
          <div style="text-align:center">${row.title || ""}</div>
        `;

        readerBox.appendChild(a);
      });

      cards = [...document.querySelectorAll(".anime-card")];
      renderPage();
    });
}

/* pagination fix */
function renderPage(page = 0) {
  const perPage = 40;
  const start = page * perPage;
  const end = start + perPage;

  cards.forEach(c => c.style.display = "none");
  cards.slice(start, end).forEach(c => c.style.display = "inline-block");
}

/* ================= SEARCH ================= */
window.searchAnime = function () {
  const q = document.getElementById("searchInput").value.toLowerCase();

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(q) ? "inline-block" : "none";
  });
};

/* ================= REPORT PANEL ================= */
window.toggleReportPanel = function () {
  document.getElementById("reportPanel")
    .classList.toggle("active");
};

/* fake report system (กัน error) */
onValue(ref(adminDb, "reports"), (snap) => {
  const list = document.getElementById("reportList");
  const badge = document.getElementById("reportUnread");

  list.innerHTML = "";

  let count = 0;

  snap.forEach(r => {
    const d = r.val();
    count++;

    const div = document.createElement("div");
    div.className = "message-item";

    div.innerHTML = `
      <div>${d.message || "report"}</div>
      <button class="btn-delete">ลบ</button>
    `;

    div.querySelector("button").onclick = () =>
      remove(ref(adminDb, "reports/" + r.key));

    list.appendChild(div);
  });

  badge.textContent = count;
});

/* ================= ONLINE COUNT ================= */
const onlineRef = ref(adminDb, "onlineCount");

runTransaction(onlineRef, (val) => (val || 0) + 1);

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", () => {
  loadFromSheet();
});
</script>

</body>
</html>
