<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Admin Dashboard</title>

<style>
:root{
  --bg:#0b0b14;
  --card:#141428;
  --accent:#00c6ff;
}

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:#fff;
}

/* LAYOUT */
.layout{ display:flex; height:100vh; }

.sidebar{
  width:220px;
  background:#111122;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1a1a33;
  color:#fff;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
}

.anime-card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* ADMIN */
.admin-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  background:#1a1a33;
  padding:10px;
  border-radius:10px;
}

button{cursor:pointer;}
.btn-delete{background:#ff3c3c;}
.btn-disable{background:#ffaa00;}

/* REPORT PANEL */
#reportPanel{
  position:fixed;
  top:0;
  right:-320px;
  width:320px;
  height:100%;
  background:#111;
  transition:.3s;
  padding:15px;
}

#notifyBtn{
  position:fixed;
  top:15px;
  right:15px;
  background:#ff006e;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

#badge{
  background:red;
  padding:3px 6px;
  border-radius:50%;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 🔔 REPORT BUTTON -->
<div id="notifyBtn" onclick="toggleReport()">
  🚨 <span id="badge">0</span>
</div>

<!-- REPORT PANEL -->
<div id="reportPanel">
  <h3>🚨 แจ้งปัญหา</h3>
  <div id="reportList"></div>
</div>

<audio id="sound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="show('anime')">🎬 อนิเมะ</button>
  <button onclick="show('admin')">⚙️ จัดการ</button>
  <button onclick="show('reportPage')">📋 รายงาน</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- ANIME -->
<div id="anime" class="page">
  <div class="card">
    👥 ออนไลน์: <span id="onlineCount">0</span>
  </div>

  <div class="card">
    <input id="search" placeholder="ค้นหา..." oninput="searchAnime()">
  </div>

  <div class="card">
    <div id="animeList" class="grid"></div>
    <br>
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page" style="display:none">
  <div class="card">
    <h3>จัดการอนิเมะ</h3>
    <div id="adminAnimeList"></div>
  </div>
</div>

<!-- REPORT PAGE -->
<div id="reportPage" class="page" style="display:none">
  <div class="card">
    <h3>แจ้งปัญหา</h3>
    <div id="reportList"></div>
  </div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove, update, runTransaction } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "YOUR_KEY",
  databaseURL: "YOUR_DB"
});
const db = getDatabase(app);

/* NAV */
window.show = (id)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
};

/* LOAD ANIME */
let cards=[];
let currentPage=0;
const perPage=30;

async function load(){
  const res = await fetch("https://opensheet.elk.sh/1zY3E1ovode0tfMAcAkX0Jk5Cwvkay_tY8cbbdRGYH58/Sheet1");
  const data = await res.json();

  const box = document.getElementById("animeList");
  box.innerHTML="";

  data.forEach(r=>{
    const div=document.createElement("div");
    div.className="anime-card";
    div.innerHTML=`<img src="${r.image}"><div>${r.title}</div>`;
    box.appendChild(div);
  });

  cards=[...document.querySelectorAll(".anime-card")];
  renderPage();
}

/* PAGINATION */
function renderPage(){
  const start=currentPage*perPage;
  const end=start+perPage;

  cards.forEach(c=>c.style.display="none");
  cards.slice(start,end).forEach(c=>c.style.display="block");
}

window.nextPage=()=>{
  if((currentPage+1)*perPage < cards.length){
    currentPage++;
    renderPage();
  }
};

window.prevPage=()=>{
  if(currentPage>0){
    currentPage--;
    renderPage();
  }
};

/* SEARCH */
window.searchAnime=()=>{
  const q=document.getElementById("search").value.toLowerCase();

  if(!q){
    currentPage=0;
    renderPage();
    return;
  }

  cards.forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? "block":"none";
  });
};

/* ADMIN */
onValue(ref(db,"anime"),snap=>{
  const box=document.getElementById("adminAnimeList");
  if(!box) return;

  box.innerHTML="";

  snap.forEach(c=>{
    const d=c.val();

    const div=document.createElement("div");
    div.className="admin-item";

    div.innerHTML=`
      <div>${d.title}</div>
      <div>
        <button class="btn-disable">ปิด</button>
        <button class="btn-delete">ลบ</button>
      </div>
    `;

    div.querySelector(".btn-disable").onclick=()=>{
      update(ref(db,"anime/"+c.key),{status:"disabled"});
    };

    div.querySelector(".btn-delete").onclick=()=>{
      remove(ref(db,"anime/"+c.key));
    };

    box.appendChild(div);
  });
});

/* REPORT + SOUND */
let lastCount=0;

onValue(ref(db,"reports"),snap=>{
  const box=document.querySelectorAll("#reportList");
  const badge=document.getElementById("badge");

  let count=0;

  box.forEach(b=>b.innerHTML="");

  snap.forEach(r=>{
    const d=r.val();
    count++;

    box.forEach(b=>{
      const div=document.createElement("div");
      div.className="admin-item";

      div.innerHTML=`
        <div>${d.message}</div>
        <button class="btn-delete">ลบ</button>
      `;

      div.querySelector("button").onclick=()=>{
        remove(ref(db,"reports/"+r.key));
      };

      b.appendChild(div);
    });
  });

  badge.textContent=count;

  if(count>lastCount){
    document.getElementById("sound").play().catch(()=>{});
  }

  lastCount=count;
});

/* REPORT PANEL */
window.toggleReport=()=>{
  const p=document.getElementById("reportPanel");
  p.style.right = p.style.right==="0px" ? "-320px":"0px";
};

/* ONLINE */
const onlineRef = ref(db,"onlineCount");

runTransaction(onlineRef,v=>(v||0)+1);

window.addEventListener("beforeunload",()=>{
  runTransaction(onlineRef,v=>Math.max((v||1)-1,0));
});

onValue(onlineRef,snap=>{
  document.getElementById("onlineCount").textContent=snap.val()||0;
});

/* START */
load();

</script>

</body>
</html>
